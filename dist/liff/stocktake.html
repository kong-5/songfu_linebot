<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>盤點</title>
<style>
  :root{
    --bg:#ffffff;--card:#ffffff;--line:#e5e7ec;--line-soft:#eef0f3;
    --txt:#1f2430;--txt-2:#5b616e;--txt-3:#8b909c;
    --accent:#2383e2;--accent-soft:#e8f1fd;
    --neg:#d23b3b;--neg-soft:#fdecec;--pos:#1f9d57;--pos-soft:#e7f6ee;
    --warn:#b9791b;--warn-soft:#fcf3e2;--chip:#eef0f3;--field:#f7f8fa;
    --shadow:0 1px 2px rgba(20,30,50,.06),0 3px 12px rgba(20,30,50,.05);
  }
  *{box-sizing:border-box;}
  html{background:#fff;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",sans-serif;-webkit-text-size-adjust:100%;}
  .wrap{max-width:600px;margin:0 auto;}
  .center{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--txt-2);padding:24px;text-align:center;}
  .spin{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  @media (prefers-reduced-motion:reduce){.spin{animation:none;}}
  .btn-primary{border:0;border-radius:11px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;padding:12px 20px;cursor:pointer;}
  /* language toggle */
  .lang{position:relative;flex:none;border:1px solid var(--line);background:var(--card);color:var(--txt-2);font-size:12px;font-weight:700;padding:6px 11px;border-radius:99px;cursor:pointer;white-space:nowrap;}
  .lang::before{content:'';position:absolute;inset:-8px;} /* 擴大點擊熱區（戴手套），視覺不變 */
  .lang:active{transform:translateY(1px);}
  /* picker */
  .pk-head{padding:16px 16px 6px;}
  .pk-top{display:flex;align-items:flex-start;gap:10px;}
  .pk-head h1{margin:0;font-size:18px;font-weight:800;letter-spacing:-.01em;flex:1;}
  .pk-head .sub{font-size:12.5px;color:var(--txt-3);margin-top:2px;}
  .co-seg{display:flex;gap:6px;padding:8px 16px 0;flex-wrap:wrap;}
  .co-seg button{border:1px solid var(--line);background:var(--field,#f7f8fa);color:var(--txt-2);font-size:13px;font-weight:700;padding:7px 14px;border-radius:99px;cursor:pointer;}
  .co-seg button.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .pk-list{padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
  .pk{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:14px 15px;cursor:pointer;text-align:left;}
  .pk:active{transform:translateY(1px);}
  .pk-ic{width:38px;height:38px;border-radius:10px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-size:19px;flex:none;}
  .pk-i{flex:1;min-width:0;}
  .pk-i .n{font-size:15px;font-weight:700;line-height:1.2;}
  .pk-i .m{font-size:12px;color:var(--txt-3);margin-top:2px;font-variant-numeric:tabular-nums;}
  .pk-done{font-size:11px;font-weight:700;color:var(--pos);background:var(--pos-soft);padding:2px 8px;border-radius:6px;white-space:nowrap;}
  .pk-draft{font-size:11px;font-weight:700;color:var(--warn);background:var(--warn-soft);padding:2px 8px;border-radius:6px;white-space:nowrap;}
  .pk-lock{font-size:11px;font-weight:700;color:var(--neg);background:var(--neg-soft);padding:2px 8px;border-radius:6px;white-space:nowrap;}
  .pk-arrow{color:var(--txt-3);font-size:20px;flex:none;}
  /* 網站版頂列（後台帳號登入時才出現，給一條明確的返回路徑，不然全螢幕頁不知怎麼回去） */
  .web-topbar{position:sticky;top:0;z-index:30;height:46px;box-sizing:border-box;display:flex;align-items:center;gap:12px;padding:0 14px;background:var(--card);border-bottom:1px solid var(--line);}
  .web-topbar a.wt-back{color:var(--accent);font-weight:700;text-decoration:none;font-size:15px;display:inline-flex;align-items:center;gap:4px;flex:none;}
  .web-topbar .wt-t{font-size:14px;font-weight:700;color:var(--txt);}
  body.web header{top:46px;} /* 盤點清單的 sticky 表頭讓出頂列高度，兩條不重疊 */
  /* count header */
  header{position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--line);}
  .head-main{display:flex;align-items:center;gap:10px;padding:10px 14px 6px;}
  .back{border:0;background:transparent;color:var(--accent);font-size:15px;font-weight:600;cursor:pointer;padding:4px 2px;flex:none;}
  .head-t{flex:1;min-width:0;}
  .head-t h1{margin:0;font-size:15.5px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .head-t .sub{font-size:11.5px;color:var(--txt-3);margin-top:1px;}
  .prog{display:flex;align-items:center;gap:8px;padding:0 14px 8px;}
  .prog-bar{flex:1;height:6px;border-radius:99px;background:var(--line-soft);overflow:hidden;}
  .prog-fill{height:100%;width:0;background:var(--accent);border-radius:99px;transition:width .25s;}
  .prog-num{font-size:12px;color:var(--txt-2);font-variant-numeric:tabular-nums;white-space:nowrap;}
  .prog-num b{color:var(--txt);}
  .tools{display:flex;gap:8px;padding:0 14px 9px;align-items:center;flex-wrap:wrap;}
  .search{flex:1;min-width:150px;display:flex;align-items:center;gap:7px;background:var(--field);border:1px solid var(--line);border-radius:9px;padding:8px 11px;}
  .search input{border:0;background:transparent;color:inherit;font-size:14px;width:100%;outline:none;-webkit-appearance:none;appearance:none;}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--field);}
  .seg button{border:0;background:transparent;color:var(--txt-2);font-size:12.5px;padding:8px 10px;font-weight:600;cursor:pointer;}
  .seg button.on{background:var(--accent);color:#fff;}
  .tog{border:1px solid var(--line);background:var(--field);color:var(--txt-2);font-size:12.5px;font-weight:600;padding:8px 11px;border-radius:9px;cursor:pointer;white-space:nowrap;}
  .tog.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  /* list */
  .list{margin:10px 12px;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
  .item{border-bottom:1px solid var(--line-soft);}
  .item:last-child{border-bottom:0;}
  .item.counted{box-shadow:inset 3px 0 0 var(--accent);}
  .row{display:flex;align-items:center;gap:10px;padding:5px 12px;min-height:42px;}
  .info{flex:1;min-width:0;}
  .nm{font-size:13.5px;font-weight:600;line-height:1.2;display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .exp-chip{position:relative;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:var(--warn-soft);color:var(--warn);flex:none;cursor:pointer;border:1px solid color-mix(in srgb,var(--warn) 28%,transparent);white-space:nowrap;}
  .exp-chip::before{content:'';position:absolute;inset:-8px;} /* 擴大點擊熱區（戴手套），視覺不變 */
  .exp-chip.filled{background:var(--warn);color:#fff;border-color:transparent;}
  .meta{font-size:11px;color:var(--txt-3);margin-top:1px;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sys{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .sys .lab{font-size:11px;color:var(--txt-3);}
  .sys .v{font-size:13.5px;font-weight:700;line-height:1.1;}
  .sys .su{font-size:10px;font-weight:600;color:var(--txt-3);}
  .qtybox{display:flex;align-items:center;gap:6px;}
  .qu{font-size:11px;font-weight:600;color:var(--txt-3);min-width:20px;}
  .qty{width:66px;text-align:right;font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;border:1.5px solid var(--line);border-radius:8px;padding:6px 8px;background:var(--field);color:var(--txt);outline:none;}
  .qty:focus{border-color:var(--accent);background:var(--card);}
  .qty::placeholder{color:var(--txt-3);font-weight:500;font-size:12px;}
  .diff{font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;padding:1px 5px;border-radius:6px;min-width:30px;text-align:center;}
  .diff.todo{background:var(--warn-soft);color:var(--warn);border:1px solid color-mix(in srgb,var(--warn) 26%,transparent);}
  .diff.eq{background:var(--pos-soft);color:var(--pos);}
  .diff.sp{background:var(--accent-soft);color:var(--accent);}
  .diff.sn{background:var(--neg-soft);color:var(--neg);}
  .zsep{font-size:11px;font-weight:700;color:var(--txt-3);letter-spacing:.02em;text-align:center;padding:9px 8px;background:var(--bg);border-top:1px solid var(--line);border-bottom:1px solid var(--line-soft);}
  .zsep.mcsep{color:#c0392b;background:#fdecea;border-top-color:#f3c2bc;}
  .mc-badge{display:inline-block;font-size:10.5px;font-weight:800;color:#fff;background:#e74c3c;border-radius:5px;padding:1px 6px;margin-right:6px;vertical-align:1px;letter-spacing:.02em;}
  .item.mc{background:#fef6f5;box-shadow:inset 3px 0 0 #e74c3c;}
  .hz-hint{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:var(--txt-3);padding:12px 8px 4px;}
  .hz-show{border:1px solid var(--line);background:var(--card);color:var(--accent);font-size:12px;font-weight:600;padding:5px 12px;border-radius:8px;cursor:pointer;}
  .batches{border-top:1px dashed var(--line);padding:9px 13px 12px;background:color-mix(in srgb,var(--warn-soft) 40%,var(--card));display:none;}
  .item.exp-open .batches{display:block;}
  .more{position:relative;width:28px;height:30px;flex:none;border:1px solid var(--line);background:var(--field);border-radius:8px;color:var(--txt-3);font-size:14px;font-weight:800;line-height:1;display:grid;place-items:center;cursor:pointer;padding:0;}
  .more::before{content:'';position:absolute;inset:-6px;} /* 點擊區擴至 40×42（戴手套），視覺不變 */
  .more.on{border-color:var(--accent);color:var(--accent);}
  .more.filled{background:var(--accent);color:#fff;border-color:transparent;font-size:12px;}
  .midbox{border-top:1px dashed var(--line);padding:10px 13px 12px;background:color-mix(in srgb,var(--accent-soft) 45%,var(--card));display:none;}
  .item.mid-show .midbox{display:block;}
  .mid-row{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
  .mid-lab{font-size:12px;color:var(--txt-2);font-weight:600;flex:1;}
  .midq{width:96px;font-size:15px;font-weight:700;text-align:right;padding:7px 9px;border:1.5px solid var(--line);border-radius:8px;background:var(--card);color:var(--txt);}
  .midq:focus{border-color:var(--accent);}
  .mid-sum{font-size:12.5px;color:var(--txt-2);font-variant-numeric:tabular-nums;}
  .b-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
  .b-head .t{font-size:11.5px;color:var(--txt-2);font-weight:600;}
  .b-sum{font-size:11.5px;color:var(--txt-2);font-variant-numeric:tabular-nums;}
  .b-sum b{color:var(--txt);}
  .brow{display:flex;gap:8px;align-items:center;margin-bottom:7px;}
  .brow input[type="date"]{flex:1;font-size:13.5px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--txt);}
  .brow input[data-k="qty"]{width:74px;font-size:14px;text-align:right;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--txt);}
  .brow .unit{font-size:12px;color:var(--txt-3);white-space:nowrap;}
  .brow .del{border:0;background:transparent;color:var(--txt-3);font-size:18px;cursor:pointer;padding:2px 4px;}
  .b-actions{display:flex;align-items:center;gap:8px;margin-top:2px;}
  .add-b{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:650;color:var(--accent);background:var(--accent-soft);border:0;border-radius:8px;padding:7px 11px;cursor:pointer;}
  .done-b{margin-left:auto;font-size:12px;font-weight:650;color:var(--txt);background:var(--card);border:1px solid var(--line);border-radius:8px;padding:7px 13px;cursor:pointer;}
  .empty{text-align:center;color:var(--txt-3);padding:36px 0;}
  .bar{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--card);border-top:1px solid var(--line);box-shadow:0 -2px 14px rgba(20,30,50,.07);}
  .bar-in{max-width:600px;margin:0 auto;display:flex;align-items:center;gap:12px;padding:11px 16px calc(11px + env(safe-area-inset-bottom));}
  .bar .s{flex:1;font-size:12.5px;color:var(--txt-2);}
  .bar .s b{color:var(--txt);font-variant-numeric:tabular-nums;}
  .submit{border:0;border-radius:11px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;padding:13px 22px;cursor:pointer;}
  .submit:disabled{opacity:.5;}
  .pad{padding-bottom:88px;}
  /* 品項照片（第四波，Sortly 式：照片語言中性，最好認貨）：縮圖 + 點擊放大 */
  /* [2026-07-11] 照片功能暫時關閉（使用者：目前不需要）。要重開刪掉下一行的 display:none。 */
  .stk-thumb{display:none!important;}
  .stk-thumb{flex:none;width:38px;height:38px;border-radius:9px;border:1px solid var(--line);background-color:var(--field);background-size:cover;background-position:center;padding:0;cursor:pointer;position:relative;}
  .stk-thumb::after{content:'';position:absolute;inset:-6px;} /* 擴大點擊熱區（戴手套），視覺不變 */
  /* 縮圖載入中：小轉圈；載入失敗：橘框＋↻ 提示可重試（三態：無照片→根本不畫縮圖） */
  .stk-thumb[aria-busy]::before{content:'';position:absolute;top:50%;left:50%;width:14px;height:14px;margin:-7px 0 0 -7px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite;}
  .stk-thumb.err{background-color:var(--warn-soft);border-color:var(--warn);}
  .stk-thumb.err::before{content:'↻';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--warn);font-size:18px;font-weight:800;}
  @media (prefers-reduced-motion:reduce){.stk-thumb[aria-busy]::before{animation:none;}}
  .lb{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:60;padding:20px;}
  .lb.on{display:flex;}
  .lb-close{position:absolute;top:calc(10px + env(safe-area-inset-top,0));right:12px;width:44px;height:44px;border-radius:50%;border:0;background:rgba(0,0,0,.55);color:#fff;font-size:26px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;}
  .lb-close:active{transform:translateY(1px);}
  .lb-stage{min-width:120px;min-height:120px;display:flex;align-items:center;justify-content:center;}
  .lb-img{max-width:94vw;max-height:86vh;border-radius:12px;background:#fff;box-shadow:0 10px 50px rgba(0,0,0,.5);display:none;}
  .lb.loaded .lb-img{display:block;}
  .lb-spin{display:none;}
  .lb.loading .lb-spin{display:block;}
  .lb-err{display:none;flex-direction:column;align-items:center;gap:12px;color:#fff;text-align:center;padding:24px;}
  .lb.error .lb-err{display:flex;}
  .lb-err-ic{font-size:34px;color:#ffcf6b;line-height:1;}
  .lb-err-tx{font-size:14px;color:#e7e9ee;}
  .lb-retry{border:0;border-radius:10px;background:#fff;color:var(--txt);font-size:15px;font-weight:700;padding:12px 24px;cursor:pointer;min-height:44px;}
</style>
</head>
<body>
<div class="web-topbar" id="webTop" style="display:none"><a class="wt-back" href="/admin/inventory">‹ 返回後台</a><span class="wt-t">網站盤點</span></div>
<div class="wrap"><div id="app"><div class="center"><div class="spin"></div><div>載入中… / Đang tải…</div></div></div></div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
(function(){
  var LIFF_ID=window.__LIFF_ID__||"";
  // 網站版（後台帳號登入）：window.__STK_WEB__ 由後台 /admin/inventory/entry 注入，改走後台 cookie，不碰 LINE token → 無登入逾時
  var WEB=(window.__STK_WEB__===true);
  var STK=WEB?(window.__STK_API__||'/admin/inventory/entry'):'/liff/api/stocktake';
  var WEB_NAME=WEB?String(window.__STK_NAME__||''):'';
  var app=document.getElementById('app');

  // ---------- 中／越 語系 ----------
  var I18N={
    zh:{
      loading:'載入中…',liffNotSet:'⚠ 尚未設定 LIFF ID（LIFF_ID_STOCKTAKE）',liffFail:'⚠ LIFF 初始化失敗',
      loadWh:'載入倉庫…',pickTitle:'選擇要盤點的倉庫',countDay:'盤點日',noWh:'目前沒有「納入盤點」的倉庫。<br>請先到後台 → 倉庫設定 勾選。',
      countedToday:'今日已盤',loadWhFail:'⚠ 載入倉庫失敗，請稍後再試',loadItems:'載入品項…',loadItemsFail:'⚠ 載入品項失敗',
      backWh:'‹ 倉庫',done:'已盤',todo:'未盤',searchPh:'搜尋料號 / 品名',fAll:'全部',fTodo:'未盤',fExp:'效期品',hideZero:'隱藏 0',
      sys:'系統',qtyPh:'盤點',match:'相符',expChip:'效期',batchTitle:'各效期數量（呆料／到期警示用）',sum:'合計',
      addBatch:'＋ 新增效期',doneBatch:'完成收起 ▴',noMatch:'沒有符合的品項',submit:'送出盤點',submitting:'送出中…',
      sent:'盤點已送出',finish:'完成',submitFail:'送出失敗：',submitFailRetry:'送出失敗，請稍後再試',langBtn:'Tiếng Việt',resumed:'續盤（已帶回今日已盤）',
      midChip:'中',midTitle:'中價貨（品質較差）數量',midPh:'中價數量',midDone:'完成收起 ▴',
      conflictTaken:'此倉今日盤點已被其他人送出，請重新載入',
      conflictStale:'開頁後已有他人送出此倉盤點，請重載後續盤再送出',
      sumLine:function(g,m,tot){return '上 '+g+'  ＋  中 '+m+'  ＝  合計 '+tot;},
      showZero:'顯示庫存0',hiddenN:function(n){return '另有 '+n+' 項庫存 0 已隱藏';},
      zeroSep:function(n){return '— 帳上 0（現場有再盤）· '+n+' 項 —';},
      mustCount:'必盤',mcSep:function(n){return '— ⚠ 必盤：昨天以來有異動，務必確認 · '+n+' 項 —';},
      draftResumed:'已回復未送出',drafting:'盤點中(未送出)',
      relogin:'登入逾時，重新登入中…（已盤資料已暫存）',
      reloginStuckTitle:'登入一直逾時',
      reloginStuck:'登入一直過期（在 LINE App 以外的瀏覽器較容易發生）。你已盤的數量都安全存在這台裝置，沒有遺失。請點下方按鈕重新登入一次，登入後會自動帶回你剛剛盤的資料。',
      reloginRetry:'重新登入一次',
      draftDumpTitle:'你已盤的內容（暫存本機，料號：數量）',
      draftCopy:'複製全部盤點內容',
      draftCopied:'已複製 ✓',
      draftMid:'中',
      invalidQty:'⚠ 以下品項數量無效（僅能填 0 或正數），請修正後再送出：',
      close:'關閉',retry:'重試',photoFail:'照片載入失敗',photoRetry:'載入失敗，點擊重試',
      itemsN:function(n){return n+' 項';},totalN:function(n){return '共 '+n+' 項';},batchN:function(n){return n+' 批';},
      progN:function(d,a){return '已盤 '+d+'/'+a;},barN:function(d,a){return '已盤 '+d+'/'+a+' · 未盤 '+(a-d);},
      confirm:function(wh,d,a){return '送出盤點？\n\n倉庫：'+wh+'\n已盤 '+d+'/'+a+' 項（未盤的會標「未盤」）';},

      +'<div class="lb-spin"><div class="spin"></div></div>'
      +'<img class="lb-img" alt="">'
      +'<div class="lb-err"><div class="lb-err-ic">↻</div><div class="lb-err-tx"></div><button type="button" class="lb-retry"></button></div>'
      +'</div>';
    document.body.appendChild(_lb);
    _lb.addEventListener('click',closeLb);                                                              // 點遮罩關閉
    _lb.querySelector('.lb-stage').addEventListener('click',function(ev){ ev.stopPropagation(); });      // 點圖／內容不關
    _lb.querySelector('.lb-close').addEventListener('click',function(ev){ ev.stopPropagation(); closeLb(); });
    _lb.querySelector('.lb-retry').addEventListener('click',function(ev){ ev.stopPropagation(); if(_lbCode) lbLoad(_lbCode); });
  }
  function closeLb(){ if(!_lb) return; _lb.classList.remove('on','loading','loaded','error'); _lb.querySelector('.lb-img').src=''; _lbCode=null; }
  function lbState(s){ _lb.classList.remove('loading','loaded','error'); if(s) _lb.classList.add(s); }
  function lbLoad(code){
    lbState('loading');
    if(Object.prototype.hasOwnProperty.call(_photoCache,code) && _photoCache[code]){ _lb.querySelector('.lb-img').src=_photoCache[code]; lbState('loaded'); return; }
    apiPhoto(code).then(function(res){
      if(_lbCode!==code || !_lb.classList.contains('on')) return;   // 期間已關閉或改看別張
      if(res.error){ lbState('error'); return; }                    // 失敗：顯示 × 與重試（不快取）
      _photoCache[code]=res.url||null;
      if(res.url){ _lb.querySelector('.lb-img').src=res.url; lbState('loaded'); repaintThumbs(code); }
      else lbState('error');                                        // 查無(hp 為真理論上不該發生)→ 當失敗讓使用者可重試
    });
  }
  function openLightbox(code){
    ensureLb(); _lbCode=code;
    _lb.querySelector('.lb-close').setAttribute('aria-label',t('close'));   // 語言切換後標籤仍正確
    _lb.querySelector('.lb-err-tx').textContent=t('photoFail');
    _lb.querySelector('.lb-retry').textContent=t('retry');
    _lb.classList.add('on'); lbLoad(code);
  }

  // ---------- 自動暫存（防電話中斷 / LIFF 重載遺失盤點）----------
  // 一邊盤一邊把「上貨/中貨/效期/展開狀態」存進本機，重開同倉同日自動接回。
  // [fix 2026-07-17] 草稿鍵必須含公司代碼（比照 scan.html）：凌越倉號可跨公司重複，
  // 同機同日先盤松富某倉再切松揚同倉號時，舊鍵會互相覆蓋草稿、恢復時把別家公司的數字帶進本倉。
  function draftKey(code,date){ return 'stk_draft_'+(S.icpno||'00')+'_'+(code||'')+'_'+(date||''); }
  function draftKeyCur(){ return S.wh?draftKey(S.wh.code,S.date):''; }
  var _saveT=null;
  function writeDraftNow(){
    if(!S.wh) return;
    try{
      var d={counts:S.counts,mid:S.mid,midOpen:S.midOpen,batches:S.batches,expanded:S.expanded};
      localStorage.setItem(draftKeyCur(),JSON.stringify(d));
    }catch(_){}
  }
  function saveDraft(){
    if(!S.wh) return;
    if(_saveT) clearTimeout(_saveT);
    _saveT=setTimeout(function(){ _saveT=null; writeDraftNow(); },250);
  }
  function hasAnyInput(){ // 有沒有任何已輸入內容（避免寫出空草稿誤標「盤點中」）
    var k,i,a;
    for(k in S.counts){ if(S.counts[k]!=null&&S.counts[k]!=='') return true; }
    for(k in S.mid){ if(S.mid[k]!=null&&S.mid[k]!=='') return true; }
    for(k in S.batches){ a=S.batches[k]||[]; for(i=0;i<a.length;i++){ if((a[i].date&&a[i].date!=='')||(a[i].qty&&a[i].qty!=='')) return true; } }
    return false;
  }
  function flushDraft(){ // 立即寫入（跳過 debounce）：切背景/關頁/續登前呼叫，避免最後幾筆輸入遺失
    if(!S.wh) return;
    if(_saveT){ clearTimeout(_saveT); _saveT=null; }
    if(!hasAnyInput()&&!hasDraft(S.wh.code,S.date)) return;
    writeDraftNow();
    syncDraftUp(true); // [2026-07-17] 同步推上雲端備援（keepalive：關頁/切背景也送得出去）
  }
  function loadDraft(code,date){ try{ var s=localStorage.getItem(draftKey(code,date)); return s?JSON.parse(s):null; }catch(_){ return null; } }
  function clearDraft(){ try{ localStorage.removeItem(draftKeyCur()); }catch(_){} }

  // ---------- [2026-07-17] 盤點鎖＋草稿雲端備援 ----------
  // 進倉先向伺服器認領此倉（一倉一日一鎖）：有人正在盤（心跳未逾時）就擋下不能進，杜絕互相覆蓋；
  // 心跳每 40 秒續租並把草稿上傳伺服器——手機當機/LINE 清快取/換裝置都能從雲端把已盤數字帶回。
  function devId(){ try{ var k='stk_devid',v=localStorage.getItem(k); if(!v){ v='d'+Date.now().toString(36)+Math.random().toString(36).slice(2,10); localStorage.setItem(k,v); } return v; }catch(_){ if(!window.__stkDev) window.__stkDev='d'+Math.random().toString(36).slice(2); return window.__stkDev; } }
  function apiPost(path,body,keepalive){
    return fetch(path,{method:'POST',keepalive:!!keepalive,headers:{'Content-Type':'application/json','Authorization':'Bearer '+freshToken()},body:JSON.stringify(body)})
      .then(function(r){ return r.json().catch(function(){return {};}); }).catch(function(){ return null; });
  }
  var _hbT=null;
  function draftPayload(){ return {src:'stk',counts:S.counts,mid:S.mid,midOpen:S.midOpen,batches:S.batches,expanded:S.expanded}; }
  function syncDraftUp(keepalive){
    if(!S.wh) return;
    apiPost(STK+'/draft-sync',{icpno:S.icpno,warehouse:S.wh.code,date:S.date,deviceId:devId(),name:S.name,payload:draftPayload()},keepalive).then(function(res){
      if(res&&res.locked){ stopHeartbeat(); var nm=res.by||''; S.wh=null; alert(t('takenOver')(nm)); showPicker(); }
    });
  }
  function startHeartbeat(){ stopHeartbeat(); _hbT=setInterval(function(){ syncDraftUp(false); },40000); }
  function stopHeartbeat(){ if(_hbT){ clearInterval(_hbT); _hbT=null; } }
  function releaseLock(){ // 回倉庫清單＝離開此倉：釋放鎖並順帶上傳最終草稿（雲端草稿保留，下一位或本人重進可接回）
    if(!S.wh) return; stopHeartbeat();
    apiPost(STK+'/draft-sync',{icpno:S.icpno,warehouse:S.wh.code,date:S.date,deviceId:devId(),release:true,payload:(hasAnyInput()?draftPayload():null)},true);
  }
  function hasDraft(code,date){ try{ return !!localStorage.getItem(draftKey(code,date)); }catch(_){ return false; } }
  function cleanOldDrafts(){ // 開頁時清掉非今日的舊草稿，避免 localStorage 累積
    try{
      var today=new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Taipei',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date());
      var del=[],i,k;
      for(i=0;i<localStorage.length;i++){ k=localStorage.key(i); if(k&&k.indexOf('stk_draft_')===0&&k.slice(-10)!==today) del.push(k); }
      for(i=0;i<del.length;i++) localStorage.removeItem(del[i]);
    }catch(_){}
  }
  // 切到背景或關頁時立即保存草稿（電話插入、切 App、LIFF 被回收都算 hidden/pagehide）
  document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='hidden') flushDraft(); });
  window.addEventListener('pagehide',flushDraft);

  // ---------- 開始 ----------
  function boot(){
    cleanOldDrafts();
    if(WEB){ // 網站版：跳過 LINE 登入，身分＝後台登入者，直接進盤點
      document.body.classList.add('web');
      var wt=document.getElementById('webTop'); if(wt) wt.style.display='flex';
      S.name=WEB_NAME;
      var icw=getParam('icpno'); if(icw&&/^\d{2}$/.test(icw)) S.icpno=icw;
      applyCoTheme();
      var whw=getParam('warehouse');
      if(whw){ openWarehouse(whw); } else { showPicker(); }
      return;
    }
    if(!LIFF_ID){ showCenter('<div>'+t('liffNotSet')+'</div>'); return; }
    liff.init({liffId:LIFF_ID}).then(function(){
      if(!liff.isLoggedIn()){ liff.login({redirectUri:location.href}); return; }
      S.idToken=liff.getIDToken();
      return liff.getProfile().then(function(p){ S.name=(p&&p.displayName)||""; }).catch(function(){});
    }).then(function(){
      var ic=getParam('icpno'); if(ic&&/^\d{2}$/.test(ic)) S.icpno=ic; // #盤點 松揚 → icpno=02 帶進來
      applyCoTheme();
      var wh=getParam('warehouse');
      if(wh){ openWarehouse(wh); } else { showPicker(); }
    }).catch(function(e){ showCenter('<div>'+t('liffFail')+'</div><div style="font-size:12px;color:var(--txt-3)">'+esc(e&&e.message||e)+'</div>'); });
  }
  function getParam(k){
    try{ var u=new URL(location.href); var v=u.searchParams.get(k); if(v) return v; }catch(_){}
    try{ var st=new URL(location.href).searchParams.get('liff.state'); if(st){ var s2=new URLSearchParams(st.charAt(0)==='?'?st.slice(1):st); var v2=s2.get(k); if(v2) return v2; } }catch(_){}
    return null;
  }

  // ---------- 倉庫選擇 ----------
  function showPicker(){
    showCenter('<div class="spin"></div><div>'+t('loadWh')+'</div>');
    api(STK+'/warehouses?icpno='+encodeURIComponent(S.icpno)).then(function(res){
      if(res.error){ showCenter('<div>⚠ '+esc(res.error)+'</div>'); return; }
      var whs=res.warehouses||[];
      var coseg='<div class="co-seg">'+CO_ORDER.map(function(c){return '<button data-co="'+c+'" class="'+(c===S.icpno?'on':'')+'">'+esc(COMPANY[c])+'</button>';}).join('')+'</div>';
      var html='<div class="pk-head"><div class="pk-top"><h1>'+esc(coName())+esc(t('pickTitle'))+'</h1>'
        +'<button class="lang" id="stLang">'+esc(t('langBtn'))+'</button></div>'
        +'<div class="sub">'+esc(t('countDay'))+' '+esc(res.date||'')+(S.name?' · '+esc(S.name):'')+'</div></div>'+coseg;
      if(!whs.length){ html+='<div class="empty">'+t('noWh')+'</div>'; }
      else{
        var pkDate=res.date||'';
        html+='<div class="pk-list">'+whs.map(function(w){
          var draft=hasDraft(w.code,pkDate);
          return '<button class="pk" data-w="'+esc(w.code)+'">'
            +'<div class="pk-ic">📦</div>'
            +'<div class="pk-i"><div class="n">'+esc(w.name||w.code)+'</div><div class="m">'+esc(w.code)+' · '+esc(t('itemsN')(w.items))+'</div></div>'
            +(w.counting!=null?'<span class="pk-lock">'+esc(t('countingBadge')(w.counting))+'</span>':(draft?'<span class="pk-draft">'+esc(t('drafting'))+'</span>':(w.countedToday?'<span class="pk-done">'+esc(t('countedToday'))+'</span>':'')))
            +'<span class="pk-arrow">›</span></button>';
        }).join('')+'</div>';
      }
      app.innerHTML='<div class="wrapx">'+html+'</div>';
      var lb=document.getElementById('stLang'); if(lb) lb.addEventListener('click',toggleLang);
      Array.prototype.forEach.call(app.querySelectorAll('.co-seg button'),function(b){ b.addEventListener('click',function(){ S.icpno=b.getAttribute('data-co'); applyCoTheme(); showPicker(); }); });
      Array.prototype.forEach.call(app.querySelectorAll('.pk'),function(b){ b.addEventListener('click',function(){ openWarehouse(b.getAttribute('data-w')); }); });
    }).catch(function(){ showCenter('<div>'+t('loadWhFail')+'</div>'); });
  }

  // ---------- 載入某倉品項 ----------
  // [2026-07-17] 進倉前先認領盤點鎖：有人正在盤（心跳未逾時）→ 擋下顯示鎖畫面（可強制接手）；
  // 認領成功時伺服器回既有雲端草稿（本機草稿遺失時的備援）。認領網路失敗不擋盤點（心跳會補認領）。
  function showLockedScreen(code,by){
    stopHeartbeat();
    showCenter('<div style="font-size:40px">⛔</div>'
      +'<div style="font-size:16px;font-weight:700;color:var(--txt)">'+esc(t('lockedTitle'))+'</div>'
      +'<div style="max-width:280px;font-size:13.5px;color:var(--txt-2);line-height:1.6">'+esc(t('lockedBy')(by))+'</div>'
      +'<button class="btn-primary" id="lkBack" style="margin-top:8px">'+esc(t('lockedBack'))+'</button>'
      +'<button id="lkForce" style="margin-top:4px;background:none;border:none;color:var(--txt-3);text-decoration:underline;font-size:13px;cursor:pointer;font-family:inherit">'+esc(t('lockedForce'))+'</button>');
    document.getElementById('lkBack').addEventListener('click',function(){ showPicker(); });
    document.getElementById('lkForce').addEventListener('click',function(){
      if(!confirm(t('lockedForceConfirm')(by))) return;
      openWarehouse(code,true);
    });
  }
  function openWarehouse(code,force){
    showCenter('<div class="spin"></div><div>'+t('loadItems')+'</div>');
    apiPost(STK+'/draft-sync',{icpno:S.icpno,warehouse:code,deviceId:devId(),name:S.name,force:!!force}).then(function(lk){
      if(lk&&lk.locked){ showLockedScreen(code,lk.by||''); return; }
      var cloudDraft=(lk&&lk.ok&&lk.draft&&lk.draft.src==='stk')?lk.draft:null;
      openWarehouseItems(code,cloudDraft);
    });
  }
  function openWarehouseItems(code,cloudDraft){
    api(STK+'/items?warehouse='+encodeURIComponent(code)+'&icpno='+encodeURIComponent(S.icpno)).then(function(res){
      if(res.error){ showCenter('<div>⚠ '+esc(res.error)+'</div>'); return; }
      S.wh=res.warehouse; S.date=res.date; S.items=res.items||[]; S.counts={}; S.mid={}; S.midOpen={}; S.batches={}; S.expanded={};
      // 樂觀鎖基準：開頁當下該 session 的 submitted_at（無 session 為 null），送出時帶回伺服器比對
      S.baseSubmittedAt=(res.submittedAt==null?null:res.submittedAt);
      S.items.forEach(function(it){ if(it.exp) S.batches[it.c]=[]; });
      // 續盤：帶回今日已存的上貨/中貨/效期批號
      S.resumed=!!res.resumed;
      var sv=res.saved||{};
      S.items.forEach(function(it){
        var s=sv[it.c]; if(!s) return;
        if(s.counted!=null) S.counts[it.c]=String(s.counted);
        if(s.mid!=null){ S.mid[it.c]=String(s.mid); S.midOpen[it.c]=true; }
        if(s.expiry&&s.expiry.length){ S.batches[it.c]=s.expiry.map(function(b){return {date:b.date||'',qty:(b.qty==null?'':String(b.qty))};}); }
      });
      // 本機暫存（未送出的盤點）優先：電話中斷/重載後接回，不用重盤
      // ⚠ 必須「逐鍵合併、草稿蓋在 saved 之上」而不是整物件取代：
      //   409 兩人同盤情境——A 送出被擋（他人 B 已先送出）後重載，saved 會帶回 B 剛送出的品項；
      //   若整包用 A 的草稿取代，B 的資料會被清掉，A 再送出就把 B 盤好的品項全數蓋空。
      //   合併後：B 已存的鍵保留、A 草稿有的鍵以 A 為準（counts/mid/midOpen/expanded 都是
      //   「品項代碼→值」的物件；batches 是「品項代碼→批號陣列」的物件，同鍵整組以草稿為準）。
      S.draftRestored=false; S.cloudRestored=false;
      // [fix 2026-07-10 #63回歸] 合併時略過草稿值為 ''／null 的鍵：''＝該品項「未盤」＝無資訊
      // （submit 端本來就略過 ''），不該蓋掉他人已送出、由 saved 帶回的值——否則 A 開頁久放的
      // 空白草稿會把 B 剛盤好的品項回彈成未盤。batches 的空陣列同理（＝沒填任何批號）。
      // trade-off：若使用者「刻意清空」某格想取消已送出的值，重載後會回彈成伺服器值；
      // 兩害相權取其輕（誤清他人資料會直接造成盤點資料遺失，回彈只需再清一次）。
      var mergeSkipEmpty=function(base,draft,isEmpty){
        var out=Object.assign({},base);
        Object.keys(draft||{}).forEach(function(k){ var v=draft[k]; if(isEmpty(v)) return; out[k]=v; });
        return out;
      };
      var emptyStr=function(v){ return v==null||String(v)===''; };
      var emptyArr=function(v){ return v==null||(Array.isArray(v)&&v.length===0); };
      var applyDraftObj=function(d){
        if(d.counts) S.counts=mergeSkipEmpty(S.counts,d.counts,emptyStr);
        if(d.mid) S.mid=mergeSkipEmpty(S.mid,d.mid,emptyStr);
        if(d.midOpen) S.midOpen=Object.assign({},S.midOpen,d.midOpen);
        if(d.batches) S.batches=mergeSkipEmpty(S.batches,d.batches,emptyArr);
        if(d.expanded) S.expanded=Object.assign({},S.expanded,d.expanded);
      };
      // [2026-07-17] 合併順序：saved（已送出續盤）→ 雲端草稿（伺服器備援，本機草稿遺失時救回）
      // → 本機草稿（此裝置最新輸入，優先權最高）
      if(cloudDraft){ applyDraftObj(cloudDraft); S.cloudRestored=true; }
      var dr=loadDraft(S.wh.code,S.date);
      if(dr){ applyDraftObj(dr); S.draftRestored=true; }
      renderCount();
      startHeartbeat();
    }).catch(function(){ showCenter('<div>'+t('loadItemsFail')+'</div>'); });
  }

  // ---------- 盤點畫面 ----------
  function goodVal(it){ return S.counts[it.c]!=null&&S.counts[it.c]!==''?num(S.counts[it.c]):null; }
  function midVal(it){ return S.mid[it.c]!=null&&S.mid[it.c]!==''?num(S.mid[it.c]):null; }
  function safetyDiff(it){ var cv=countedVal(it); if(cv==null||isNaN(cv)) return null; return Math.round((cv-it.sys)*100)/100; }
  // 合計 = 上貨 + 中貨（任一有值即計）
  function countedVal(it){ var g=goodVal(it),m=midVal(it); if((g==null||isNaN(g))&&(m==null||isNaN(m))) return null; return Math.round(((g||0)+(m||0))*100)/100; }
  function isCounted(it){ var g=goodVal(it),m=midVal(it); return (g!=null&&!isNaN(g))||(m!=null&&!isNaN(m)); } // NaN 視為未盤
  function batchSum(c){ return (S.batches[c]||[]).reduce(function(s,b){var v=num(b.qty);return s+(isFinite(v)?v:0);},0); }
  function diffPill(it){
    var d=safetyDiff(it);
    if(d==null) return '<span class="diff todo">'+esc(t('todo'))+'</span>';       // 未盤：琥珀
    if(d===0)   return '<span class="diff eq">'+esc(t('match'))+'</span>';         // 相符：綠
    return '<span class="diff '+(d>0?'sp':'sn')+'">'+esc(d>0?'+'+fmt(d):fmt(d))+'</span>'; // 盤盈:藍 / 盤虧:紅
  }
  function batchRows(it){
    var arr=S.batches[it.c]||[];
    var rows=arr.map(function(b,i){
      return '<div class="brow" data-i="'+i+'"><input type="date" value="'+esc(b.date||'')+'" data-k="date">'
        +'<input type="text" inputmode="decimal" placeholder="0" value="'+esc(b.qty||'')+'" data-k="qty">'
        +'<span class="unit">'+esc(it.eunit||it.u)+'</span><button class="del" data-del="'+i+'">×</button></div>';
    }).join('');
    return '<div class="batches"><div class="b-head"><span class="t">'+esc(t('batchTitle'))+'</span>'
      +'<span class="b-sum">'+esc(t('sum'))+' <b>'+fmt(batchSum(it.c))+'</b> '+esc(it.eunit||it.u)+'</span></div>'+rows
      +'<div class="b-actions"><button class="add-b" data-add>'+esc(t('addBatch'))+'</button><button class="done-b" data-done>'+esc(t('doneBatch'))+'</button></div></div>';
  }
  function midPanel(it){
    var g=goodVal(it),m=midVal(it),tot=countedVal(it);
    return '<div class="midbox"><div class="mid-row"><span class="mid-lab">'+esc(t('midTitle'))+'</span>'
      +'<input type="text" inputmode="decimal" class="midq" placeholder="'+esc(t('midPh'))+'" value="'+esc(S.mid[it.c]!=null?S.mid[it.c]:'')+'" data-midc="'+esc(it.c)+'"><span class="unit">'+esc(it.u)+'</span></div>'
      +'<div class="mid-sum">'+esc(t('sumLine')(fmt(g||0),fmt(m||0),fmt(tot==null?0:tot)))+'</div>'
      +'<div class="b-actions"><button class="done-b" data-middone>'+esc(t('midDone'))+'</button></div></div>';
  }
  function rowHtml(it){
    var cnt=isCounted(it)?' counted':''; var open=S.expanded[it.c]?' exp-open':''; var mopen=S.midOpen[it.c]?' mid-show':'';
    var mv=midVal(it);
    // 中價貨：平常收起，右邊一個很小的「⋯」；有中貨時顯示「中」並變藍
    var moreBtn='<button class="more'+(mv!=null?' filled':'')+(S.midOpen[it.c]?' on':'')+'" data-midtoggle aria-label="'+esc(t('midTitle'))+'">'+(mv!=null?esc(t('midChip')):'⋯')+'</button>';
    var right='<div class="qtybox">'+diffPill(it)+'<input class="qty" inputmode="decimal" placeholder="'+esc(t('qtyPh'))+'" value="'+esc(S.counts[it.c]!=null?S.counts[it.c]:'')+'" data-c="'+esc(it.c)+'">'+(it.u?'<span class="qu">'+esc(it.u)+'</span>':'')+moreBtn+'</div>';
    var nb=(S.batches[it.c]||[]).length;
    var chip=it.exp?'<button class="exp-chip'+(nb?' filled':'')+'" data-toggle>'+esc(t('expChip'))+(nb?' '+esc(t('batchN')(nb)):'')+(S.expanded[it.c]?' ▴':' ▾')+'</button>':'';
    var thumb=it.hp?'<button type="button" class="stk-thumb" data-pc="'+esc(it.c)+'" aria-label="'+esc(it.n)+' 照片"></button>':'';
    var mcBadge=it.mc?'<span class="mc-badge">'+esc(t('mustCount'))+'</span>':'';
    return '<div class="item'+cnt+open+mopen+(it.mc?' mc':'')+'" data-c="'+esc(it.c)+'"><div class="row">'+thumb+'<div class="info"><div class="nm">'+mcBadge+esc(it.n)+chip+'</div>'
      +'<div class="meta">'+esc(it.c)+(it.s?' · '+esc(it.s):'')+'</div></div>'
      +'<div class="sys"><div class="lab">'+esc(t('sys'))+'</div><div class="v">'+fmt(it.sys)+(it.u?' <span class="su">'+esc(it.u)+'</span>':'')+'</div></div>'+right+'</div>'+midPanel(it)+(it.exp?batchRows(it):'')+'</div>';
  }
  function isZeroIdle(it){ return Number(it.sys)===0 && !isCounted(it); }  // 帳上0且尚未盤
  function listHtml(){
    var q=S.q.toLowerCase();
    var searching=!!q;   // 搜尋時忽略隱藏/排序，讓帳上0但現場有的品項也找得到
    var arr=S.items.filter(function(it){
      if(S.f==='todo'&&isCounted(it)) return false;
      if(S.f==='exp'&&!it.exp) return false;
      if(q&&it.c.toLowerCase().indexOf(q)<0&&it.n.toLowerCase().indexOf(q)<0) return false;
      return true;
    });
    if(!arr.length) return '<div class="list"><div class="empty">'+esc(t('noMatch'))+'</div></div>';
    var body;
    if(searching){
      body='<div class="list">'+arr.map(rowHtml).join('')+'</div>';
    } else {
      // 排序：必盤（昨天以來有異動）浮到最上面 → 一般 → 帳上0沉到最後（各自分隔）
      var must=[],top=[],zeros=[];
      for(var i=0;i<arr.length;i++){ var it=arr[i]; if(it.mc) must.push(it); else if(isZeroIdle(it)) zeros.push(it); else top.push(it); }
      var html='';
      if(must.length) html+='<div class="zsep mcsep">'+esc(t('mcSep')(must.length))+'</div>'+must.map(rowHtml).join('');
      html+=top.map(rowHtml).join('');
      if(zeros.length) html+='<div class="zsep">'+esc(t('zeroSep')(zeros.length))+'</div>'+zeros.map(rowHtml).join('');
      body='<div class="list">'+html+'</div>';
    }
    return body;
  }
  function renderCount(){
    var done=S.items.filter(isCounted).length, all=S.items.length;
    app.innerHTML=''
      +'<header><div class="head-main"><button class="back" id="stBack">'+esc(t('backWh'))+'</button>'
        +'<div class="head-t"><h1>'+esc(S.wh.name||S.wh.code)+'</h1><div class="sub">'+esc(t('countDay'))+' '+esc(S.date)+' · '+esc(t('totalN')(all))+(S.draftRestored?' · <b style="color:var(--pos)">'+esc(t('draftResumed'))+'</b>':(S.cloudRestored?' · <b style="color:var(--pos)">'+esc(t('cloudResumed'))+'</b>':(S.resumed?' · <b style="color:var(--accent)">'+esc(t('resumed'))+'</b>':'')))+'</div></div>'
        +'<button class="lang" id="stLang">'+esc(t('langBtn'))+'</button></div>'
        +'<div class="prog"><div class="prog-bar"><div class="prog-fill" id="stFill"></div></div><div class="prog-num"><span id="stProgTxt"></span></div></div>'
        +'<div class="tools"><div class="search"><input id="stQ" type="search" enterkeyhint="search" placeholder="'+esc(t('searchPh'))+'" autocomplete="off" value="'+esc(S.q)+'"></div>'
          +'<div class="seg" id="stFilter"><button data-f="all" class="'+(S.f==='all'?'on':'')+'">'+esc(t('fAll'))+'</button><button data-f="todo" class="'+(S.f==='todo'?'on':'')+'">'+esc(t('fTodo'))+'</button><button data-f="exp" class="'+(S.f==='exp'?'on':'')+'">'+esc(t('fExp'))+'</button></div>'
          +'</div>'
      +'</header>'
      +'<div class="pad" id="stListWrap">'+listHtml()+'</div>'
      +'<div class="bar"><div class="bar-in"><div class="s" id="stBarTxt"></div>'
        +'<button class="submit" id="stSubmit">'+esc(t('submit'))+'</button></div></div>';
    bindCount(); updateProg(); observeThumbs();
  }
  function relist(){ document.getElementById('stListWrap').innerHTML=listHtml(); observeThumbs(); saveDraft(); }
  function updateProg(){
    var done=S.items.filter(isCounted).length, all=S.items.length;
    document.getElementById('stProgTxt').textContent=t('progN')(done,all);
    document.getElementById('stBarTxt').textContent=t('barN')(done,all);
    document.getElementById('stFill').style.width=(all?Math.round(done/all*100):0)+'%';
  }
  function bindCount(){
    document.getElementById('stBack').addEventListener('click',function(){ writeDraftNow(); releaseLock(); S.wh=null; showPicker(); });
    document.getElementById('stLang').addEventListener('click',toggleLang);
    var t2=null, qEl=document.getElementById('stQ');
    qEl.addEventListener('input',function(e){ if(t2)clearTimeout(t2); t2=setTimeout(function(){ S.q=e.target.value.trim(); relist(); },120); });
    qEl.addEventListener('keydown',function(e){ if(e.key==='Enter'){ e.preventDefault(); e.target.blur(); } }); // Enter 收鍵盤
    document.getElementById('stFilter').addEventListener('click',function(e){ var b=e.target.closest('button'); if(!b)return; S.f=b.getAttribute('data-f'); Array.prototype.forEach.call(this.querySelectorAll('button'),function(x){x.classList.toggle('on',x===b);}); relist(); });
    var wrap=document.getElementById('stListWrap');
    wrap.addEventListener('input',function(e){
      var el=e.target;
      // 數量類輸入即時正規化（逗號→小數點、濾掉非數字字元）
      if(el.classList.contains('qty')||el.classList.contains('midq')||el.getAttribute('data-k')==='qty') sanitizeNumInput(el);
      if(el.classList.contains('qty')){
        var c=el.getAttribute('data-c'); S.counts[c]=el.value;
        var item=el.closest('.item'); var it=S.items.find(function(x){return x.c===c;});
        item.classList.toggle('counted',isCounted(it));
        var pill=item.querySelector('.diff'); if(pill) pill.outerHTML=diffPill(it);
        var ms=item.querySelector('.mid-sum'); if(ms) ms.textContent=t('sumLine')(fmt(goodVal(it)||0),fmt(midVal(it)||0),fmt(countedVal(it)==null?0:countedVal(it)));
        updateProg();
      } else if(el.classList.contains('midq')){
        var c=el.getAttribute('data-midc'); S.mid[c]=el.value;
        var item=el.closest('.item'); var it=S.items.find(function(x){return x.c===c;});
        item.classList.toggle('counted',isCounted(it));
        var pill=item.querySelector('.diff'); if(pill) pill.outerHTML=diffPill(it);
        var more=item.querySelector('.more'); if(more){ var mv=midVal(it); more.classList.toggle('filled',mv!=null); more.textContent=(mv!=null?t('midChip'):'⋯'); }
        var ms=item.querySelector('.mid-sum'); if(ms) ms.textContent=t('sumLine')(fmt(goodVal(it)||0),fmt(midVal(it)||0),fmt(countedVal(it)==null?0:countedVal(it)));
        updateProg();
      } else if(el.getAttribute('data-k')){
        var item=el.closest('.item'), c=item.getAttribute('data-c'), i=+el.closest('.brow').getAttribute('data-i');
        S.batches[c][i][el.getAttribute('data-k')]=el.value; item.querySelector('.b-sum b').textContent=fmt(batchSum(c));
      }
      saveDraft();
    });
    wrap.addEventListener('click',function(e){
      var th=e.target.closest('.stk-thumb');
      if(th){ openLightbox(th.getAttribute('data-pc')); return; }
      var add=e.target.closest('[data-add]'),del=e.target.closest('[data-del]'),done=e.target.closest('[data-done]'),tg=e.target.closest('[data-toggle]');
      var midtg=e.target.closest('[data-midtoggle]'),middone=e.target.closest('[data-middone]');
      if(add){ var c=e.target.closest('.item').getAttribute('data-c'); S.expanded[c]=true; S.batches[c].push({date:'',qty:''}); relist(); }
      else if(del){ var item=e.target.closest('.item'),c=item.getAttribute('data-c'); S.expanded[c]=true; S.batches[c].splice(+del.getAttribute('data-del'),1); relist(); }
      else if(done){ var c=e.target.closest('.item').getAttribute('data-c'); S.expanded[c]=false; relist(); }
      else if(tg){ var c=e.target.closest('.item').getAttribute('data-c'); S.expanded[c]=!S.expanded[c]; relist(); }
      else if(midtg){ var c=e.target.closest('.item').getAttribute('data-c'); S.midOpen[c]=!S.midOpen[c]; relist(); }
      else if(middone){ var c=e.target.closest('.item').getAttribute('data-c'); S.midOpen[c]=false; relist(); }
    });
    document.getElementById('stSubmit').addEventListener('click',submit);
  }

  // ---------- 送出 ----------
  function submit(){
    // 送出前防呆：掃出無效（NaN）或負數的輸入，列出品名（中越雙語）並中止
    var bad=[];
    S.items.forEach(function(it){
      var g=goodVal(it), m=midVal(it);
      var badBatch=(S.batches[it.c]||[]).some(function(b){ if(b.qty==null||b.qty==='') return false; var v=num(b.qty); return isNaN(v)||v<0; });
      if((g!=null&&(isNaN(g)||g<0))||(m!=null&&(isNaN(m)||m<0))||badBatch) bad.push(it.n);
    });
    if(bad.length){ alert(I18N.zh.invalidQty+'\n'+I18N.vi.invalidQty+'\n\n'+bad.join('\n')); return; }
    var done=S.items.filter(isCounted).length;
    if(!confirm(t('confirm')(S.wh.name||S.wh.code,done,S.items.length))) return;
    var btn=document.getElementById('stSubmit'); btn.disabled=true; btn.textContent=t('submitting');
    var counts=[];
    S.items.forEach(function(it){
      var g=goodVal(it), m=midVal(it);
      if(g!=null&&isNaN(g)) g=null; if(m!=null&&isNaN(m)) m=null; // NaN 一律視為未盤（防呆已擋，這裡再保險）
      var bx=(S.batches[it.c]||[]).filter(function(b){return (b.date&&b.date!=='')||(b.qty&&b.qty!=='');})
        .map(function(b){return {date:b.date||'',qty:(b.qty==null?'':String(b.qty).replace(/,/g,'.'))};}); // 舊草稿可能殘留逗號
      if(g==null && m==null && !bx.length) return; // 未盤
      // counted 傳「上貨」，mid 傳「中貨」；後端合計存 counted_qty
      counts.push({ code:it.c, name:it.n, spec:it.s, unit:it.u, sys:it.sys, counted:(g==null?null:g), mid:(m==null?null:m), expiry:bx });
    });
    fetch(STK+'/submit',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+freshToken()},
      body:JSON.stringify({warehouse:S.wh.code,icpno:S.icpno,date:S.date,name:S.name,counts:counts,baseSubmittedAt:(S.baseSubmittedAt==null?null:S.baseSubmittedAt),deviceId:devId()})
    }).then(function(r){ return r.json().catch(function(){return {};}).then(function(j){ return {status:r.status,res:j,redirected:r.redirected}; }); }).then(function(o){
      var res=o.res||{};
      if(WEB&&(o.status===401||o.status===403||o.redirected)){ // 後台 cookie 逾期：草稿保住，重登後台再送（不誤判成功清草稿）
        btn.disabled=false; btn.textContent=t('submit'); webLoginNeeded(); return;
      }
      if(o.status===401&&/expired|IdToken/i.test(String(res.error||''))){
        relogin(); return; // ID Token 過期：草稿已保住，續登回來自動帶回再送
      }
      if(o.status===409){
        // 開頁後已有他人送出此倉盤點（樂觀鎖/唯一約束/盤點鎖擋下）：提示後重新載入資料，
        // 本機草稿（localStorage）未清除，重載後會照舊蓋回，不會遺失已盤內容
        btn.disabled=false; btn.textContent=t('submit');
        alert(res.code==='locked'?(res.error||t('conflictStale')):(res.code==='conflict_taken'?t('conflictTaken'):t('conflictStale')));
        openWarehouse(S.wh.code);
        return;
      }
      if(res.error){ btn.disabled=false; btn.textContent=t('submit'); alert(t('submitFail')+res.error); return; }
      stopHeartbeat(); // 送出成功：伺服器已同交易清掉鎖與雲端草稿，停止心跳避免又把鎖搶回來
      clearDraft(); // 已送出，清掉本機暫存
      var whLabel=S.wh.name||S.wh.code, dateLabel=S.date;
      S.wh=null; // 避免之後切背景時 flushDraft 又把已送出的內容寫回草稿
      showCenter('<div style="font-size:44px">✅</div><div style="font-size:17px;font-weight:700;color:var(--txt)">'+esc(t('sent'))+'</div>'
        +'<div>'+esc(whLabel)+' · '+esc(dateLabel)+'</div>'
        +'<div style="font-size:13px;color:var(--txt-3)">'+esc(t('recorded')(res.counted,res.total))+'</div>'
        +'<button class="btn-primary" id="stClose" style="margin-top:8px">'+esc(t('finish'))+'</button>');
      document.getElementById('stClose').addEventListener('click',function(){ try{ if(!WEB && liff.isInClient()) liff.closeWindow(); else showPicker(); }catch(_){ showPicker(); } });
    }).catch(function(){ btn.disabled=false; btn.textContent=t('submit'); alert(t('submitFailRetry')); });
  }

  boot();
})();
</script>
