<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>掃碼盤點</title>
<style>
  :root{
    --bg:#ffffff;--card:#ffffff;--line:#e5e7ec;--line-soft:#eef0f3;
    --txt:#1f2430;--txt-2:#5b616e;--txt-3:#8b909c;
    --accent:#2383e2;--accent-soft:#e8f1fd;
    --neg:#d23b3b;--neg-soft:#fdecec;--pos:#1f9d57;--pos-soft:#e7f6ee;
    --warn:#b9791b;--warn-soft:#fcf3e2;--chip:#eef0f3;--field:#f7f8fa;
    --shadow:0 1px 2px rgba(20,30,50,.06),0 3px 12px rgba(20,30,50,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{background:#fff;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",sans-serif;-webkit-text-size-adjust:100%;}
  .wrap{max-width:600px;margin:0 auto;}
  .center{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--txt-2);padding:24px;text-align:center;}
  .spin{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  @media (prefers-reduced-motion:reduce){.spin{animation:none;}}
  .btn-primary{border:0;border-radius:11px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;padding:12px 20px;cursor:pointer;}
  /* picker（沿用盤點頁樣式） */
  .pk-head{padding:16px 16px 6px;}
  .pk-head h1{margin:0;font-size:18px;font-weight:800;letter-spacing:-.01em;}
  .pk-head .sub{font-size:12.5px;color:var(--txt-3);margin-top:2px;}
  .co-seg{display:flex;gap:6px;padding:10px 16px 0;flex-wrap:wrap;}
  .co-seg button{border:1px solid var(--line);background:var(--field);color:var(--txt-2);font-size:13px;font-weight:700;padding:7px 14px;border-radius:99px;cursor:pointer;}
  .co-seg button.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .pk-list{padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
  .pk{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:14px 15px;cursor:pointer;text-align:left;width:100%;}
  .pk:active{transform:translateY(1px);}
  .pk-ic{width:38px;height:38px;border-radius:10px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-size:19px;flex:none;}
  .pk-i{flex:1;min-width:0;}
  .pk-i .n{font-size:15px;font-weight:700;line-height:1.2;}
  .pk-i .m{font-size:12px;color:var(--txt-3);margin-top:2px;font-variant-numeric:tabular-nums;}
  .pk-done{font-size:11px;font-weight:700;color:var(--pos);background:var(--pos-soft);padding:2px 8px;border-radius:6px;white-space:nowrap;}
  .pk-arrow{color:var(--txt-3);font-size:20px;flex:none;}
  .empty{text-align:center;color:var(--txt-3);padding:36px 16px;line-height:1.6;}
  /* header */
  header{position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--line);}
  .head-main{display:flex;align-items:center;gap:10px;padding:10px 14px 8px;}
  .back{border:0;background:transparent;color:var(--accent);font-size:15px;font-weight:600;cursor:pointer;padding:4px 2px;flex:none;}
  .head-t{flex:1;min-width:0;}
  .head-t h1{margin:0;font-size:15.5px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .head-t .sub{font-size:11.5px;color:var(--txt-3);margin-top:1px;}
  /* camera */
  .cam{position:relative;margin:10px 12px 0;border-radius:14px;overflow:hidden;background:#10131a;box-shadow:var(--shadow);}
  .cam video{display:block;width:100%;height:30vh;object-fit:cover;}
  .cam.paused video{opacity:.35;}
  .cam-line{position:absolute;left:10%;right:10%;top:50%;height:2px;background:rgba(255,80,80,.85);border-radius:2px;box-shadow:0 0 8px rgba(255,80,80,.7);}
  .cam-hint{position:absolute;left:0;right:0;bottom:0;padding:7px 10px;font-size:11.5px;color:#fff;background:linear-gradient(transparent,rgba(0,0,0,.55));text-align:center;}
  .cam-tools{position:absolute;top:8px;right:8px;display:flex;gap:6px;}
  .cam-btn{border:0;border-radius:9px;background:rgba(0,0,0,.45);color:#fff;font-size:12px;font-weight:700;padding:7px 11px;cursor:pointer;}
  .cam-off{padding:22px 14px;text-align:center;color:#c7ccd6;font-size:13px;line-height:1.6;}
  .scanv2{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 14px;}
  .scanv2 button{border:0;border-radius:14px;background:var(--accent);color:#fff;font-size:18px;font-weight:800;padding:18px 40px;cursor:pointer;box-shadow:0 4px 14px rgba(35,131,226,.4);}
  .scanv2 .d{font-size:12px;color:#c7ccd6;}
  /* manual input */
  .manual{display:flex;gap:8px;margin:10px 12px 0;}
  .manual input{flex:1;font-size:15px;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;background:var(--field);color:var(--txt);outline:none;font-variant-numeric:tabular-nums;}
  .manual input:focus{border-color:var(--accent);background:var(--card);}
  .manual button{border:0;border-radius:10px;background:var(--accent);color:#fff;font-size:14px;font-weight:700;padding:0 16px;cursor:pointer;white-space:nowrap;}
  /* current item card */
  .cur{margin:10px 12px 0;background:var(--card);border:1.5px solid var(--accent);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;}
  .cur-in{padding:12px 14px 10px;}
  .cur .nm{font-size:16.5px;font-weight:800;line-height:1.25;}
  .cur .meta{font-size:12px;color:var(--txt-3);margin-top:2px;font-variant-numeric:tabular-nums;}
  .cur .tags{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;}
  .tag{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--chip);color:var(--txt-2);}
  .tag.warn{background:var(--warn-soft);color:var(--warn);}
  .cur-qty{display:flex;align-items:center;gap:10px;margin-top:10px;}
  .cur-qty .sysbox{flex:1;font-size:12px;color:var(--txt-2);}
  .cur-qty .sysbox b{font-size:15px;color:var(--txt);font-variant-numeric:tabular-nums;}
  .qdisp{min-width:120px;display:flex;align-items:baseline;justify-content:flex-end;gap:6px;border:1.5px solid var(--accent);background:var(--accent-soft);border-radius:12px;padding:8px 14px;cursor:pointer;}
  .qdisp .v{font-size:26px;font-weight:900;font-variant-numeric:tabular-nums;color:var(--txt);line-height:1;}
  .qdisp .u{font-size:12px;font-weight:700;color:var(--txt-3);}
  .qdisp.editing{background:#fff;box-shadow:0 0 0 3px rgba(35,131,226,.18);}
  /* PDA keypad */
  .pad9{border-top:1px solid var(--line-soft);background:var(--field);padding:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
  .pad9 button{border:1px solid var(--line);background:var(--card);border-radius:12px;font-size:22px;font-weight:800;padding:13px 0;cursor:pointer;color:var(--txt);box-shadow:0 1px 2px rgba(20,30,50,.05);}
  .pad9 button:active{transform:translateY(1px);background:var(--field);}
  .pad9 .fn{font-size:15px;font-weight:800;color:var(--txt-2);}
  .pad9 .ok{grid-row:span 2;background:var(--accent);border-color:var(--accent);color:#fff;font-size:17px;}
  .pad9 .minus{color:var(--neg);}
  .pad9 .plus{color:var(--pos);}
  /* counted list */
  .sec-t{margin:14px 16px 6px;font-size:12px;font-weight:800;color:var(--txt-3);letter-spacing:.03em;}
  .list{margin:0 12px;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
  .item{display:flex;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid var(--line-soft);cursor:pointer;}
  .item:last-child{border-bottom:0;}
  .item .info{flex:1;min-width:0;}
  .item .nm{font-size:13.5px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .item .meta{font-size:10.5px;color:var(--txt-3);margin-top:1px;font-variant-numeric:tabular-nums;}
  .item .v{font-size:14.5px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .item .su{font-size:10.5px;color:var(--txt-3);font-weight:600;}
  .diff{font-size:10.5px;font-weight:700;font-variant-numeric:tabular-nums;padding:1px 6px;border-radius:6px;min-width:30px;text-align:center;}
  .diff.eq{background:var(--pos-soft);color:var(--pos);}
  .diff.sp{background:var(--accent-soft);color:var(--accent);}
  .diff.sn{background:var(--neg-soft);color:var(--neg);}
  /* bottom bar */
  .bar{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--card);border-top:1px solid var(--line);box-shadow:0 -2px 14px rgba(20,30,50,.07);}
  .bar-in{max-width:600px;margin:0 auto;display:flex;align-items:center;gap:12px;padding:11px 16px calc(11px + env(safe-area-inset-bottom));}
  .bar .s{flex:1;font-size:12.5px;color:var(--txt-2);}
  .bar .s b{color:var(--txt);font-variant-numeric:tabular-nums;}
  .submit{border:0;border-radius:11px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;padding:13px 22px;cursor:pointer;}
  .submit:disabled{opacity:.5;}
  .pad{padding-bottom:96px;}
  /* bind sheet */
  .sheet-mask{position:fixed;inset:0;background:rgba(15,20,30,.45);z-index:40;display:flex;align-items:flex-end;}
  .sheet{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-width:600px;margin:0 auto;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 -6px 30px rgba(20,30,50,.25);}
  .sheet-h{padding:14px 16px 8px;border-bottom:1px solid var(--line-soft);}
  .sheet-h .t{font-size:15.5px;font-weight:800;}
  .sheet-h .bc{font-size:12.5px;color:var(--txt-2);margin-top:3px;font-variant-numeric:tabular-nums;}
  .sheet-h .bc b{color:var(--txt);letter-spacing:.03em;}
  .sheet-x{position:absolute;right:12px;top:10px;border:0;background:transparent;color:var(--txt-3);font-size:22px;cursor:pointer;padding:4px 8px;}
  .sheet-body{padding:10px 14px 16px;overflow-y:auto;flex:1;}
  .sheet .search{display:flex;align-items:center;gap:7px;background:var(--field);border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:8px;}
  .sheet .search input{border:0;background:transparent;color:inherit;font-size:15px;width:100%;outline:none;}
  .cand{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:7px;cursor:pointer;}
  .cand:active{transform:translateY(1px);}
  .cand .info{flex:1;min-width:0;}
  .cand .nm{font-size:14px;font-weight:700;}
  .cand .meta{font-size:11px;color:var(--txt-3);margin-top:1px;font-variant-numeric:tabular-nums;}
  .cand .sysv{font-size:12.5px;color:var(--txt-2);font-variant-numeric:tabular-nums;white-space:nowrap;}
  .bind-qps{display:flex;align-items:center;gap:10px;background:var(--warn-soft);border:1px solid color-mix(in srgb,var(--warn) 28%,transparent);border-radius:10px;padding:10px 12px;margin:4px 0 10px;}
  .bind-qps .lab{flex:1;font-size:12.5px;color:var(--warn);font-weight:700;}
  .bind-qps input{width:76px;text-align:center;font-size:16px;font-weight:800;border:1.5px solid var(--line);border-radius:9px;padding:7px 6px;background:var(--card);color:var(--txt);}
  .bind-sel{background:var(--accent-soft);border:1.5px solid var(--accent);border-radius:10px;padding:10px 12px;margin-bottom:10px;}
  .bind-sel .nm{font-size:14.5px;font-weight:800;}
  .bind-sel .meta{font-size:11.5px;color:var(--txt-2);margin-top:1px;}
  .bind-act{display:flex;gap:10px;}
  .bind-act .go{flex:1;border:0;border-radius:11px;background:var(--accent);color:#fff;font-size:15px;font-weight:800;padding:13px;cursor:pointer;}
  .bind-act .go:disabled{opacity:.45;}
  .bind-act .cancel{border:1px solid var(--line);border-radius:11px;background:var(--card);color:var(--txt-2);font-size:14px;font-weight:700;padding:13px 16px;cursor:pointer;}
  .hint{font-size:11.5px;color:var(--txt-3);margin:2px 2px 8px;}
  /* toast */
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:110px;z-index:50;background:rgba(25,30,40,.92);color:#fff;font-size:13.5px;font-weight:700;padding:10px 16px;border-radius:99px;box-shadow:0 4px 18px rgba(0,0,0,.25);opacity:0;transition:opacity .18s;pointer-events:none;max-width:86vw;text-align:center;}
  .toast.on{opacity:1;}
</style>
</head>
<body>
<div class="wrap"><div id="app"><div class="center"><div class="spin"></div><div>載入中…</div></div></div></div>
<div class="toast" id="toast"></div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
(function(){
  var LIFF_ID=window.__LIFF_ID__||"";
  // 兩種入口：① LINE LIFF（走 /liff/api/*、LINE 登入）② 後台網頁版（__SCAN_WEB__，走 /admin/scan/*、後台 cookie 登入）
  var WEB=!!window.__SCAN_WEB__;
  var APIB=window.__SCAN_API__||'/admin/scan';
  var app=document.getElementById('app');
  var COMPANY={'00':'松富','01':'龍港','02':'松揚','03':'松成'};
  var CO_ORDER=['02','00','01','03']; // 掃碼主要給松揚用，排最前
  function apiUrl(kind){
    if(WEB) return APIB+'/'+kind; // /admin/scan/warehouses|items|barcodes|search|bind|submit
    switch(kind){
      case 'warehouses': return '/liff/api/stocktake/warehouses';
      case 'items': return '/liff/api/stocktake/items';
      case 'submit': return '/liff/api/stocktake/submit';
      default: return '/liff/api/scan/'+kind; // barcodes|search|bind
    }
  }

  var S={idToken:null,name:'',icpno:'02',wh:null,date:'',items:[],itemIdx:{},counts:{},order:[],
         barcodes:{},cur:null,scanning:false,stream:null,detector:null,zreader:null,engine:'',extra:{},
         kpOpen:false,kpFresh:false};

  function esc(s){s=(s==null?'':String(s));return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function fmt(n){var v=Number(n);if(!isFinite(v))return '0';return String(Math.round(v*100)/100);}
  function api(path){
    if(WEB) return fetch(path,{credentials:'same-origin'}).then(function(r){return r.json();});
    return fetch(path,{headers:{'Authorization':'Bearer '+(S.idToken||'')}}).then(function(r){return r.json();});
  }
  function post(path,body){
    if(WEB) return fetch(path,{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.json();});
    return fetch(path,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(S.idToken||'')},body:JSON.stringify(body)}).then(function(r){return r.json();});
  }
  function showCenter(html){app.innerHTML='<div class="center">'+html+'</div>';}
  function coName(){return COMPANY[S.icpno]||('公司'+S.icpno);}
  // 公司主題色:松揚(02)橘、其餘藍。改 :root 的 --accent 讓整頁換色。
  function applyCoTheme(){var o=(S.icpno==='02');var r=document.documentElement.style;r.setProperty('--accent',o?'#e8730c':'#2383e2');r.setProperty('--accent-soft',o?'#fdecd9':'#e8f1fd');}

  var _toastT=null;
  function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');if(_toastT)clearTimeout(_toastT);_toastT=setTimeout(function(){el.classList.remove('on');},1400);}

  // ---------- 提示音／震動 ----------
  var _ac=null;
  function beep(ok){
    try{
      _ac=_ac||new (window.AudioContext||window.webkitAudioContext)();
      if(_ac.state==='suspended')_ac.resume();
      var o=_ac.createOscillator(),g=_ac.createGain();
      o.connect(g);g.connect(_ac.destination);
      o.frequency.value=ok?1320:340;g.gain.value=.12;
      o.start();o.stop(_ac.currentTime+(ok?.08:.22));
    }catch(_){}
    try{navigator.vibrate&&navigator.vibrate(ok?50:[80,60,80]);}catch(_){}
  }

  // ---------- 本機暫存（同倉同日續掃） ----------
  function draftKey(){return 'scan_draft_'+S.icpno+'_'+(S.wh?S.wh.code:'')+'_'+S.date;}
  var _saveT=null;
  function saveDraft(){
    if(!S.wh)return;
    if(_saveT)clearTimeout(_saveT);
    _saveT=setTimeout(function(){try{localStorage.setItem(draftKey(),JSON.stringify({counts:S.counts,order:S.order,extra:S.extra}));}catch(_){}},250);
  }
  function loadDraft(){try{var s=localStorage.getItem(draftKey());return s?JSON.parse(s):null;}catch(_){return null;}}
  function clearDraft(){try{localStorage.removeItem(draftKey());}catch(_){}}

  // ---------- 開始 ----------
  function getParam(k){
    try{var u=new URL(location.href);var v=u.searchParams.get(k);if(v)return v;}catch(_){}
    try{var st=new URL(location.href).searchParams.get('liff.state');if(st){var s2=new URLSearchParams(st.charAt(0)==='?'?st.slice(1):st);var v2=s2.get(k);if(v2)return v2;}}catch(_){}
    return null;
  }
  function boot(){
    var p=getParam('icpno');if(p&&/^\d{2}$/.test(p))S.icpno=p;
    else{try{var last=localStorage.getItem('scan_icpno');if(last&&/^\d{2}$/.test(last))S.icpno=last;}catch(_){}}
    applyCoTheme();
    if(WEB){ // 後台網頁版：不需要 LINE 登入，身分由後台 cookie session 決定
      S.name=window.__SCAN_NAME__||'';
      showPicker();
      return;
    }
    if(!LIFF_ID){showCenter('<div>⚠ 尚未設定 LIFF ID（LIFF_ID_SCAN）</div>');return;}
    liff.init({liffId:LIFF_ID}).then(function(){
      if(!liff.isLoggedIn()){liff.login({redirectUri:location.href});return;}
      S.idToken=liff.getIDToken();
      return liff.getProfile().then(function(pr){S.name=(pr&&pr.displayName)||'';}).catch(function(){});
    }).then(function(){showPicker();})
    .catch(function(e){showCenter('<div>⚠ LIFF 初始化失敗</div><div style="font-size:12px;color:var(--txt-3)">'+esc(e&&e.message||e)+'</div>');});
  }

  // ---------- 公司＋倉庫選擇 ----------
  function coSegHtml(){
    return '<div class="co-seg">'+CO_ORDER.map(function(c){
      return '<button data-co="'+c+'" class="'+(c===S.icpno?'on':'')+'">'+esc(COMPANY[c]||c)+'</button>';
    }).join('')+'</div>';
  }
  function showPicker(){
    stopScan();
    showCenter('<div class="spin"></div><div>載入倉庫…</div>');
    api(apiUrl('warehouses')+'?icpno='+encodeURIComponent(S.icpno)).then(function(res){
      if(res.error){showCenter('<div>⚠ '+esc(res.error)+'</div>');return;}
      var whs=res.warehouses||[];
      var html='<div class="pk-head"><h1>掃碼盤點</h1>'
        +'<div class="sub">選擇公司與倉庫 · 盤點日 '+esc(res.date||'')+(S.name?' · '+esc(S.name):'')+'</div></div>'
        +coSegHtml();
      if(!whs.length){html+='<div class="empty">'+esc(coName())+'還沒有「納入盤點」的倉庫。<br>請先讓內網代理推送庫存（公司代碼設 00,01,02,03），<br>再到後台 → 倉庫設定（切到'+esc(coName())+'）勾選要盤的倉。</div>';}
      else{
        html+='<div class="pk-list">'+whs.map(function(w){
          return '<button class="pk" data-w="'+esc(w.code)+'">'
            +'<div class="pk-ic">▦</div>'
            +'<div class="pk-i"><div class="n">'+esc(w.name||w.code)+'</div><div class="m">'+esc(w.code)+' · '+esc(String(w.items))+' 項</div></div>'
            +(w.countedToday?'<span class="pk-done">今日已盤</span>':'')
            +'<span class="pk-arrow">›</span></button>';
        }).join('')+'</div>';
      }
      app.innerHTML='<div>'+html+'</div>';
      Array.prototype.forEach.call(app.querySelectorAll('.co-seg button'),function(b){
        b.addEventListener('click',function(){
          S.icpno=b.getAttribute('data-co');
          try{localStorage.setItem('scan_icpno',S.icpno);}catch(_){}
          applyCoTheme();
          showPicker();
        });
      });
      Array.prototype.forEach.call(app.querySelectorAll('.pk'),function(b){b.addEventListener('click',function(){openWarehouse(b.getAttribute('data-w'));});});
    }).catch(function(){showCenter('<div>⚠ 載入倉庫失敗，請稍後再試</div>');});
  }

  // ---------- 載入倉庫品項＋條碼對照 ----------
  function openWarehouse(code){
    showCenter('<div class="spin"></div><div>載入品項與條碼…</div>');
    Promise.all([
      api(apiUrl('items')+'?warehouse='+encodeURIComponent(code)+'&icpno='+encodeURIComponent(S.icpno)),
      api(apiUrl('barcodes')+'?icpno='+encodeURIComponent(S.icpno))
    ]).then(function(rs){
      var res=rs[0],bc=rs[1];
      if(res.error){showCenter('<div>⚠ '+esc(res.error)+'</div>');return;}
      S.wh=res.warehouse;S.date=res.date;S.items=res.items||[];
      S.baseSubmittedAt=(res.submittedAt!=null?res.submittedAt:null); // 樂觀鎖基準（配合後端 submit）
      S.itemIdx={};S.items.forEach(function(it){S.itemIdx[it.c]=it;});
      S.barcodes=(bc&&bc.map)||{};
      S.counts={};S.order=[];S.extra={};S.cur=null;S.kpOpen=false;
      // 續盤：帶回今日已送出的數
      var sv=res.saved||{};
      Object.keys(sv).forEach(function(c){
        var s=sv[c];var tot=(s.counted==null?0:Number(s.counted))+(s.mid==null?0:Number(s.mid));
        if(s.counted!=null||s.mid!=null){S.counts[c]=String(tot);S.order.push(c);}
      });
      // 本機未送出草稿優先
      var dr=loadDraft();
      if(dr){if(dr.counts)S.counts=dr.counts;if(dr.order)S.order=dr.order;if(dr.extra)S.extra=dr.extra;}
      renderScan();
      startScan();
    }).catch(function(){showCenter('<div>⚠ 載入失敗，請稍後再試</div>');});
  }

  function itemOf(code){return S.itemIdx[code]||S.extra[code]||null;}
  function countedCount(){return S.order.filter(function(c){return S.counts[c]!=null&&S.counts[c]!=='';}).length;}

  // ---------- 掃描畫面 ----------
  function renderScan(){
    stopScan();
    app.innerHTML=''
      +'<header><div class="head-main"><button class="back" id="scBack">‹ 倉庫</button>'
        +'<div class="head-t"><h1>'+esc(S.wh.name||S.wh.code)+'</h1><div class="sub">'+esc(coName())+' · '+esc(S.date)+' · 掃碼盤點</div></div>'
      +'</div></header>'
      +'<div class="pad">'
        +'<div class="cam" id="scCam"><video id="scVideo" playsinline muted autoplay></video><div class="cam-line"></div>'
          +'<div class="cam-tools"><button class="cam-btn" id="scTorch" style="display:none;">手電筒</button><button class="cam-btn" id="scPause">暫停</button></div>'
          +'<div class="cam-hint" id="scHint">對準條碼即可（自動連續掃描）</div></div>'
        +'<div class="manual"><input id="scManual" inputmode="numeric" placeholder="掃不到？手動輸入條碼或料號" autocomplete="off"><button id="scManualGo">帶入</button></div>'
        +'<div id="scCur"></div>'
        +'<div class="sec-t" id="scListT"></div><div id="scList"></div>'
      +'</div>'
      +'<div class="bar"><div class="bar-in"><div class="s" id="scBarTxt"></div><button class="submit" id="scSubmit">送出盤點</button></div></div>';
    document.getElementById('scBack').addEventListener('click',function(){stopScan();showPicker();});
    document.getElementById('scPause').addEventListener('click',function(){
      if(S.scanning){pauseScan();this.textContent='繼續';}else{resumeScan();this.textContent='暫停';}
    });
    document.getElementById('scManualGo').addEventListener('click',manualGo);
    document.getElementById('scManual').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();manualGo();}});
    document.getElementById('scSubmit').addEventListener('click',submit);
    renderCur();renderList();updateBar();
  }
  function manualGo(){
    var el=document.getElementById('scManual');var v=(el.value||'').trim();
    if(!v)return;el.value='';
    onBarcode(v,true);
  }

  // ---------- 掃描引擎鏈：BarcodeDetector → zxing(純JS, iPhone可用) → liff.scanCodeV2 → 手動 ----------
  var FORMATS=['ean_13','ean_8','upc_a','upc_e','code_128','code_39','itf','qr_code'];
  function stopScan(){
    S.scanning=false;
    try{if(S.zreader){S.zreader.reset();S.zreader=null;}}catch(_){}
    try{if(S.stream){S.stream.getTracks().forEach(function(t){t.stop();});S.stream=null;}}catch(_){}
  }
  function pauseScan(){S.scanning=false;var c=document.getElementById('scCam');if(c)c.classList.add('paused');}
  function resumeScan(){
    var c=document.getElementById('scCam');if(c)c.classList.remove('paused');
    if(S.engine==='native'&&S.stream){S.scanning=true;nativeLoop();}
    else if(S.engine==='zxing'){S.scanning=true;}
    else if(S.engine==='scanv2'){S.scanning=true;}
  }
  // 切到背景（切 App、鎖屏）就整個關掉相機與解碼，回前景再自動重啟——長時間盤點時最省電、避免手機一直發燙
  document.addEventListener('visibilitychange',function(){
    if(document.visibilityState==='hidden'){
      if(S.scanning&&(S.engine==='native'||S.engine==='zxing')){ S._resumeOnShow=true; stopScan(); }
    } else if(S._resumeOnShow){
      S._resumeOnShow=false; startScan();
    }
  });
  function startScan(){
    var video=document.getElementById('scVideo');
    if(!video)return;
    if('BarcodeDetector' in window){
      try{S.detector=new BarcodeDetector({formats:FORMATS});}catch(_){S.detector=null;}
      if(S.detector){startNative(video);return;}
    }
    // iPhone LINE 瀏覽器等：載本地 zxing（純 JS 解碼）
    loadZxing(function(ok){
      if(ok){startZxing(video);}
      else{startScanV2OrManual();}
    });
  }
  function startNative(video){
    // 解析度降到 960×540（省電/降溫，1D 條碼仍夠清）
    navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:960},height:{ideal:540}},audio:false})
    .then(function(stream){
      S.stream=stream;S.engine='native';video.srcObject=stream;
      return video.play().then(function(){
        S.scanning=true;nativeLoop();
        try{
          var track=stream.getVideoTracks()[0];
          var caps=track.getCapabilities?track.getCapabilities():{};
          if(caps.torch){
            var tb=document.getElementById('scTorch');var on=false;
            tb.style.display='';
            tb.addEventListener('click',function(){on=!on;track.applyConstraints({advanced:[{torch:on}]}).catch(function(){});tb.textContent=on?'關手電筒':'手電筒';});
          }
        }catch(_){}
      });
    })
    .catch(function(){startScanV2OrManual('無法開啟相機（可能未授權）。');});
  }
  function nativeLoop(){
    if(!S.scanning||S.engine!=='native')return;
    var video=document.getElementById('scVideo');
    if(!video||video.readyState<2){setTimeout(nativeLoop,180);return;}
    S.detector.detect(video).then(function(codes){
      if(S.scanning&&codes&&codes.length){
        var raw=String(codes[0].rawValue||'').trim();
        if(raw)hitBarcode(raw);
      }
    }).catch(function(){}).then(function(){if(S.scanning)setTimeout(nativeLoop,380);});
  }
  function loadZxing(cb){
    if(window.ZXing){cb(true);return;}
    var s=document.createElement('script');
    s.src='/liff/vendor/zxing.min.js';
    s.onload=function(){cb(!!window.ZXing);};
    s.onerror=function(){cb(false);};
    document.head.appendChild(s);
  }
  function startZxing(video){
    try{
      if(!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)){startScanV2OrManual();return;}
      var Z=window.ZXing;
      var hints=new Map();
      hints.set(Z.DecodeHintType.POSSIBLE_FORMATS,[Z.BarcodeFormat.EAN_13,Z.BarcodeFormat.EAN_8,Z.BarcodeFormat.UPC_A,Z.BarcodeFormat.UPC_E,Z.BarcodeFormat.CODE_128,Z.BarcodeFormat.CODE_39,Z.BarcodeFormat.ITF,Z.BarcodeFormat.QR_CODE]);
      hints.set(Z.DecodeHintType.TRY_HARDER,true);
      S.zreader=new Z.BrowserMultiFormatReader(hints,500); // 解碼間隔 300→500ms，降 CPU/降溫
      S.engine='zxing';S.scanning=true;
      // 解析度降到 960×540（純 JS 解碼最吃資源，降解析度顯著降溫）
      S.zreader.decodeFromConstraints({video:{facingMode:'environment',width:{ideal:960},height:{ideal:540}},audio:false},video,function(result){
        if(result&&S.scanning){
          var raw=String(result.getText()||'').trim();
          if(raw)hitBarcode(raw);
        }
      }).catch(function(){startScanV2OrManual('無法開啟相機（可能未授權）。');});
    }catch(_){startScanV2OrManual();}
  }
  function startScanV2OrManual(prefix){
    var cam=document.getElementById('scCam');if(!cam)return;
    var canV2=false;
    try{canV2=liff.isInClient()&&liff.isApiAvailable&&liff.isApiAvailable('scanCodeV2');}catch(_){}
    if(canV2){
      S.engine='scanv2';S.scanning=true;
      cam.innerHTML='<div class="scanv2"><button id="scV2">📷 掃描條碼</button><div class="d">'+esc((prefix||'')+'此手機用 LINE 內建掃碼：按一下掃一個')+'</div></div>';
      document.getElementById('scV2').addEventListener('click',function(){
        liff.scanCodeV2().then(function(r){
          var raw=String((r&&r.value)||'').trim();
          if(raw)onBarcode(raw,false);
        }).catch(function(){});
      });
    }else{
      S.engine='manual';
      cam.innerHTML='<div class="cam-off">'+esc((prefix||'')+'這支手機無法用相機連續掃描，請用下方欄位手動輸入條碼／料號（外接藍牙掃描槍對準欄位掃也可以）。')+'</div>';
    }
  }
  var _lastCode='',_lastAt=0;
  function hitBarcode(raw){
    var now=Date.now();
    if(raw===_lastCode&&now-_lastAt<=1500)return; // 同碼 1.5 秒內不重複觸發
    _lastCode=raw;_lastAt=now;
    onBarcode(raw,false);
  }

  // ---------- 掃到條碼 ----------
  function onBarcode(raw,isManual){
    var hit=S.barcodes[raw];
    if(hit){
      var it=itemOf(hit.c);
      if(!it){fetchItem(hit.c,function(it2){if(it2)addScan(it2,hit.q||1);else{beep(false);toast('查無品項 '+hit.c);}});return;}
      addScan(it,hit.q||1);
      return;
    }
    if(isManual&&S.itemIdx[raw]){addScan(S.itemIdx[raw],1);return;}
    beep(false);
    openBind(raw);
  }
  function fetchItem(code,cb){
    api(apiUrl('search')+'?icpno='+encodeURIComponent(S.icpno)+'&q='+encodeURIComponent(code)).then(function(res){
      var it=(res.items||[]).filter(function(x){return x.c===code;})[0]||null;
      if(it)S.extra[code]=it;
      cb(it);
    }).catch(function(){cb(null);});
  }
  function addScan(it,inc){
    beep(true);
    var cur=parseFloat(S.counts[it.c]);
    var v=(isFinite(cur)?cur:0)+(Number(inc)||1);
    S.counts[it.c]=fmt(v);
    if(S.order.indexOf(it.c)<0)S.order.push(it.c);
    S.cur=it.c;
    S.kpOpen=true;S.kpFresh=true; // PDA 手感：掃到就開鍵盤，直接打數字＝覆蓋
    toast(it.n+'  '+(inc>1?'＋'+fmt(inc):'＋1')+' → '+fmt(v)+(it.u||''));
    renderCur();renderList();updateBar();saveDraft();
  }

  // ---------- 目前品項卡＋PDA 大鍵盤 ----------
  function kpHtml(){
    var rows=[['7','8','9','⌫'],['4','5','6','−1'],['1','2','3','＋1'],['.','0','C','OK']];
    return '<div class="pad9">'+rows.map(function(r){return r.map(function(k){
      var cls='',lab=k;
      if(k==='⌫')cls='fn';
      if(k==='C'){cls='fn';lab='清';}
      if(k==='−1')cls='fn minus';
      if(k==='＋1')cls='fn plus';
      if(k==='OK'){cls='fn ok';lab='完成';}
      return '<button data-k="'+esc(k)+'" class="'+cls+'">'+esc(lab)+'</button>';
    }).join('');}).join('')+'</div>';
  }
  function renderCur(){
    var box=document.getElementById('scCur');if(!box)return;
    if(!S.cur){box.innerHTML='<div class="hint" style="margin:12px 16px 0;">掃到的品項會出現在這裡；同一條碼連掃會累加，或用大鍵盤直接輸入數量。</div>';return;}
    var it=itemOf(S.cur);if(!it){box.innerHTML='';return;}
    var notInWh=!S.itemIdx[it.c];
    box.innerHTML='<div class="cur"><div class="cur-in"><div class="nm">'+esc(it.n)+'</div>'
      +'<div class="meta">'+esc(it.c)+(it.s?' · '+esc(it.s):'')+'</div>'
      +(notInWh?'<div class="tags"><span class="tag warn">非本倉品項（'+esc(it.w||'?')+'）</span></div>':'')
      +'<div class="cur-qty"><div class="sysbox">帳上 <b>'+fmt(it.sys)+'</b> '+esc(it.u||'')+'</div>'
        +'<div class="qdisp'+(S.kpOpen?' editing':'')+'" id="scQd"><span class="v" id="scQv">'+esc(S.counts[it.c]!=null&&S.counts[it.c]!==''?S.counts[it.c]:'0')+'</span><span class="u">'+esc(it.u||'')+'</span></div></div>'
      +'</div>'+(S.kpOpen?kpHtml():'')+'</div>';
    document.getElementById('scQd').addEventListener('click',function(){S.kpOpen=!S.kpOpen;S.kpFresh=true;renderCur();});
    var pad=box.querySelector('.pad9');
    if(pad)pad.addEventListener('click',function(e){
      var b=e.target.closest('button');if(!b)return;
      keyPress(it,b.getAttribute('data-k'));
    });
  }
  function setQty(it,v){
    S.counts[it.c]=v;
    if(S.order.indexOf(it.c)<0)S.order.push(it.c);
    var qv=document.getElementById('scQv');if(qv)qv.textContent=(v===''?'0':v);
    renderList();updateBar();saveDraft();
  }
  function keyPress(it,k){
    var cur=String(S.counts[it.c]!=null?S.counts[it.c]:'');
    if(k==='OK'){S.kpOpen=false;renderCur();return;}
    if(k==='C'){S.kpFresh=false;setQty(it,'');return;}
    if(k==='⌫'){S.kpFresh=false;setQty(it,cur.slice(0,-1));return;}
    if(k==='＋1'||k==='−1'){
      S.kpFresh=false;
      var n=parseFloat(cur);n=(isFinite(n)?n:0)+(k==='＋1'?1:-1);if(n<0)n=0;
      setQty(it,fmt(n));return;
    }
    if(k==='.'){
      if(S.kpFresh){S.kpFresh=false;setQty(it,'0.');return;}
      if(cur.indexOf('.')>=0)return;
      setQty(it,(cur===''?'0':cur)+'.');return;
    }
    // 數字：掃完直接打＝覆蓋（PDA 手感），之後續打＝接在後面
    if(S.kpFresh){S.kpFresh=false;setQty(it,k);return;}
    if(cur==='0')cur='';
    if(cur.replace('.','').length>=7)return;
    setQty(it,cur+k);
  }

  // ---------- 已盤清單 ----------
  function diffPill(it){
    var v=parseFloat(S.counts[it.c]);if(!isFinite(v))return '';
    var d=Math.round((v-Number(it.sys||0))*100)/100;
    if(d===0)return '<span class="diff eq">相符</span>';
    return '<span class="diff '+(d>0?'sp':'sn')+'">'+(d>0?'+'+fmt(d):fmt(d))+'</span>';
  }
  function renderList(){
    var box=document.getElementById('scList'),tt=document.getElementById('scListT');
    if(!box)return;
    var codes=S.order.slice().reverse().filter(function(c){return S.counts[c]!=null&&S.counts[c]!=='';});
    tt.textContent=codes.length?('已盤 '+codes.length+' 項（點品項可修改）'):'';
    if(!codes.length){box.innerHTML='';return;}
    box.innerHTML='<div class="list">'+codes.map(function(c){
      var it=itemOf(c);if(!it)return '';
      return '<div class="item" data-c="'+esc(c)+'"><div class="info"><div class="nm">'+esc(it.n)+'</div>'
        +'<div class="meta">'+esc(c)+' · 帳上 '+fmt(it.sys)+'</div></div>'
        +diffPill(it)
        +'<div class="v">'+esc(S.counts[c])+' <span class="su">'+esc(it.u||'')+'</span></div></div>';
    }).join('')+'</div>';
    Array.prototype.forEach.call(box.querySelectorAll('.item'),function(el){
      el.addEventListener('click',function(){S.cur=el.getAttribute('data-c');S.kpOpen=true;S.kpFresh=true;renderCur();window.scrollTo({top:0,behavior:'smooth'});});
    });
  }
  function updateBar(){
    var el=document.getElementById('scBarTxt');if(!el)return;
    el.innerHTML='已盤 <b>'+countedCount()+'</b> / 倉內 '+S.items.length+' 項';
  }

  // ---------- 綁定新條碼 ----------
  var B={barcode:'',sel:null};
  function openBind(raw){
    if(S.engine==='native')pauseScan();
    if(S.engine==='zxing')S.scanning=false;
    var pb=document.getElementById('scPause');if(pb)pb.textContent='繼續';
    B={barcode:raw,sel:null};
    var mask=document.createElement('div');mask.className='sheet-mask';mask.id='bindMask';
    mask.innerHTML='<div class="sheet" style="position:relative;">'
      +'<button class="sheet-x" id="bindX">×</button>'
      +'<div class="sheet-h"><div class="t">新條碼，綁定品項</div><div class="bc">條碼 <b>'+esc(raw)+'</b> 還沒對應到'+esc(coName())+'的品項</div></div>'
      +'<div class="sheet-body">'
        +'<div id="bindSelBox"></div>'
        +'<div class="search"><input id="bindQ" placeholder="搜尋品名 / 料號 / 規格" autocomplete="off"></div>'
        +'<div class="hint">找到品項後點一下選取；之後掃這個條碼就會直接帶入。</div>'
        +'<div id="bindRes"></div>'
        +'<div class="bind-qps"><span class="lab">掃 1 下＝幾個單位？（整箱條碼填入數）</span><input id="bindQps" inputmode="decimal" value="1"></div>'
        +'<div class="bind-act"><button class="cancel" id="bindCancel">取消</button><button class="go" id="bindGo" disabled>綁定並帶入</button></div>'
      +'</div></div>';
    document.body.appendChild(mask);
    var close=function(){
      var m=document.getElementById('bindMask');if(m)m.remove();
      // 關掉綁定面板就自動恢復連續掃描（PDA 手感，不用再按「繼續」）
      resumeScan();var pb2=document.getElementById('scPause');if(pb2)pb2.textContent='暫停';
    };
    document.getElementById('bindX').addEventListener('click',close);
    document.getElementById('bindCancel').addEventListener('click',close);
    var t2=null;
    document.getElementById('bindQ').addEventListener('input',function(e){
      if(t2)clearTimeout(t2);
      t2=setTimeout(function(){bindSearch(e.target.value.trim());},200);
    });
    document.getElementById('bindGo').addEventListener('click',function(){
      if(!B.sel)return;
      var qps=parseFloat(document.getElementById('bindQps').value);
      if(!isFinite(qps)||qps<=0)qps=1;
      var btn=this;btn.disabled=true;btn.textContent='綁定中…';
      post(apiUrl('bind'),{icpno:S.icpno,barcode:B.barcode,erp_code:B.sel.c,qty_per_scan:qps}).then(function(res){
        if(res.error){btn.disabled=false;btn.textContent='綁定並帶入';alert('綁定失敗：'+res.error);return;}
        S.barcodes[B.barcode]={c:B.sel.c,q:qps};
        if(!S.itemIdx[B.sel.c])S.extra[B.sel.c]=B.sel;
        close();
        addScan(itemOf(B.sel.c),qps);
      }).catch(function(){btn.disabled=false;btn.textContent='綁定並帶入';alert('綁定失敗，請稍後再試');});
    });
    setTimeout(function(){var q=document.getElementById('bindQ');if(q)q.focus();},50);
  }
  function bindSearch(q){
    var box=document.getElementById('bindRes');if(!box)return;
    if(!q){box.innerHTML='';return;}
    box.innerHTML='<div class="hint">搜尋中…</div>';
    api(apiUrl('search')+'?icpno='+encodeURIComponent(S.icpno)+'&q='+encodeURIComponent(q)).then(function(res){
      var items=res.items||[];
      if(!items.length){box.innerHTML='<div class="hint">找不到符合的品項</div>';return;}
      box.innerHTML=items.map(function(it,i){
        return '<button class="cand" data-i="'+i+'"><div class="info"><div class="nm">'+esc(it.n)+'</div>'
          +'<div class="meta">'+esc(it.c)+(it.s?' · '+esc(it.s):'')+(it.w?' · 倉 '+esc(it.w):'')+'</div></div>'
          +'<div class="sysv">帳上 '+fmt(it.sys)+' '+esc(it.u||'')+'</div></button>';
      }).join('');
      Array.prototype.forEach.call(box.querySelectorAll('.cand'),function(b){
        b.addEventListener('click',function(){
          B.sel=items[+b.getAttribute('data-i')];
          var sb=document.getElementById('bindSelBox');
          sb.innerHTML='<div class="bind-sel"><div class="nm">'+esc(B.sel.n)+'</div><div class="meta">'+esc(B.sel.c)+(B.sel.s?' · '+esc(B.sel.s):'')+' · 帳上 '+fmt(B.sel.sys)+' '+esc(B.sel.u||'')+'</div></div>';
          document.getElementById('bindGo').disabled=false;
        });
      });
    }).catch(function(){box.innerHTML='<div class="hint">搜尋失敗，請再試一次</div>';});
  }

  // ---------- 送出 ----------
  function submit(){
    var codes=S.order.filter(function(c){return S.counts[c]!=null&&S.counts[c]!=='';});
    if(!codes.length){alert('還沒有掃任何品項');return;}
    if(!confirm('送出盤點？\n\n倉庫：'+(S.wh.name||S.wh.code)+'（'+coName()+'）\n已盤 '+codes.length+' 項'))return;
    var btn=document.getElementById('scSubmit');btn.disabled=true;btn.textContent='送出中…';
    var counts=[];
    codes.forEach(function(c){
      var it=itemOf(c);if(!it)return;
      var v=parseFloat(S.counts[c]);if(!isFinite(v))return;
      counts.push({code:it.c,name:it.n,spec:it.s,unit:it.u,sys:it.sys,counted:v,mid:null,expiry:[]});
    });
    post(apiUrl('submit'),{warehouse:S.wh.code,icpno:S.icpno,date:S.date,name:S.name,counts:counts,baseSubmittedAt:S.baseSubmittedAt}).then(function(res){
      if(res.error){
        btn.disabled=false;btn.textContent='送出盤點';
        if(res.code==='conflict_stale'||res.code==='conflict_taken'){alert('這個倉今天已經有人送出盤點了，請退回重進、續盤後再送出。');return;}
        alert('送出失敗：'+res.error);return;
      }
      clearDraft();stopScan();
      showCenter('<div style="font-size:44px">✅</div><div style="font-size:17px;font-weight:700;color:var(--txt)">盤點已送出</div>'
        +'<div>'+esc(S.wh.name||S.wh.code)+'（'+esc(coName())+'）· '+esc(S.date)+'</div>'
        +'<div style="font-size:13px;color:var(--txt-3)">已記錄 '+esc(String(res.counted))+' 項</div>'
        +'<button class="btn-primary" id="scClose" style="margin-top:8px">完成</button>');
      document.getElementById('scClose').addEventListener('click',function(){try{if(liff.isInClient())liff.closeWindow();else showPicker();}catch(_){showPicker();}});
    }).catch(function(){btn.disabled=false;btn.textContent='送出盤點';alert('送出失敗，請稍後再試');});
  }

  boot();
})();
</script>
</body>
</html>
