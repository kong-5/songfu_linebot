<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>員工 LINE 綁定 · 松富物流</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body { font-family: ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif; background:#f7f6f3; margin:0; min-height:100vh; padding:20px; color:#37352f; }
  .box { max-width:480px; margin:0 auto; background:#fff; border:1px solid #e3e2e0; border-radius:12px; padding:24px; box-shadow:0 4px 16px rgba(15,23,42,.06); }
  h1 { font-size:20px; margin:0 0 16px; }
  .row { display:flex; align-items:center; gap:12px; margin:12px 0; padding:12px; background:#fafafa; border-radius:8px; }
  .row img { width:44px; height:44px; border-radius:50%; background:#eee; flex-shrink:0; }
  .row .name { font-size:15px; font-weight:600; }
  .row .uid { font-size:11px; color:#787774; font-family:ui-monospace,monospace; margin-top:2px; word-break:break-all; }
  .target { background:#eef5ff; border:1px solid #cfe1ff; padding:12px 14px; border-radius:8px; margin:10px 0; font-size:14px; }
  .target strong { color:#1d4ed8; }
  .status { padding:14px; border-radius:8px; font-size:14px; margin:12px 0; line-height:1.5; }
  .status.loading { background:#fff8e1; color:#856404; }
  .status.ok { background:#e7f5e9; color:#2e7d32; }
  .status.err { background:#ffebee; color:#c62828; }
  button { width:100%; padding:14px; border-radius:8px; border:none; font-size:16px; font-weight:700; cursor:pointer; margin-top:8px; min-height:48px; }
  button.primary { background:#06c755; color:#fff; }
  button.primary:disabled { background:#ccc; cursor:not-allowed; }
  button.secondary { background:#fff; color:#37352f; border:1px solid #d7d6d4; }
  .hint { font-size:12px; color:#787774; line-height:1.6; margin-top:14px; }
  code { background:#f3f3f3; padding:1px 6px; border-radius:3px; font-size:13px; }
</style>
</head>
<body>
<div class="box">
  <h1>員工 LINE 綁定</h1>
  <div id="me-row" class="row" style="display:none;">
    <img id="me-pic" alt="">
    <div style="flex:1;min-width:0;">
      <div class="name" id="me-name">—</div>
      <div class="uid" id="me-uid">—</div>
    </div>
  </div>
  <div id="target-row" class="target" style="display:none;">
    將綁定到員工帳號：<strong id="target-user">—</strong>
  </div>
  <div id="status" class="status loading">初始化中…</div>
  <button id="bind-btn" class="primary" disabled>綁定到此 LINE 帳號</button>
  <button id="close-btn" class="secondary" style="display:none;">關閉</button>
  <div class="hint">
    <p style="margin:0 0 6px;">綁定後，您在客戶群中傳送的訊息將以員工身份記錄，不會進入 AI 解析。</p>
    <p style="margin:0;">如需解除，請至後台「人員管理」按解綁。</p>
  </div>
</div>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
(function(){
  const LIFF_ID = window.__LIFF_ID__ || "";
  const BIND_TOKEN = new URLSearchParams(location.search).get("t") || "";
  const $ = (s) => document.querySelector(s);
  const status = $("#status");
  const btn = $("#bind-btn");
  const closeBtn = $("#close-btn");
  function setStatus(cls, text){ status.className = "status " + cls; status.textContent = text; }
  function showClose(){
    closeBtn.style.display = "block";
    closeBtn.addEventListener("click", () => {
      if (window.liff && liff.isInClient && liff.isInClient()) liff.closeWindow();
      else window.close();
    });
  }
  if (!LIFF_ID) {
    setStatus("err", "尚未設定 LIFF_ID_EMPLOYEE_BIND。請至後台確認環境變數。");
    return;
  }
  if (!BIND_TOKEN) {
    setStatus("err", "連結缺少綁定 token（?t=…）。請向管理員索取新的綁定連結。");
    return;
  }
  liff.init({ liffId: LIFF_ID }).then(async () => {
    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: location.href });
      return;
    }
    const profile = await liff.getProfile();
    $("#me-pic").src = profile.pictureUrl || "";
    $("#me-name").textContent = profile.displayName || "(未設定名稱)";
    $("#me-uid").textContent = profile.userId;
    $("#me-row").style.display = "flex";

    // 預檢綁定 token（顯示要綁的員工帳號）
    try {
      const r = await fetch("/liff/api/employee-bind/lookup?t=" + encodeURIComponent(BIND_TOKEN));
      const j = await r.json();
      if (!j.ok) {
        setStatus("err", "綁定連結無效或已過期：" + (j.error || ""));
        return;
      }
      $("#target-user").textContent = j.username;
      $("#target-row").style.display = "block";
      setStatus("loading", "請按下「綁定」按鈕完成綁定。");
      btn.disabled = false;
    } catch (e) {
      setStatus("err", "無法驗證連結：" + (e?.message || e));
      return;
    }

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      setStatus("loading", "綁定中…");
      const idToken = liff.getIDToken();
      if (!idToken) {
        setStatus("err", "無法取得 ID Token，請重新開啟此頁面。");
        return;
      }
      try {
        const resp = await fetch("/liff/api/employee-bind/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ idToken, token: BIND_TOKEN, displayName: profile.displayName || null }),
        });
        const j = await resp.json();
        if (!j.ok) {
          setStatus("err", "綁定失敗：" + (j.error || "未知錯誤"));
          showClose();
          return;
        }
        setStatus("ok", "已成功綁定 " + j.username + "。可關閉此頁面。");
        showClose();
      } catch (e) {
        setStatus("err", "綁定失敗：" + (e?.message || e));
        showClose();
      }
    });
  }).catch((e) => {
    setStatus("err", "LIFF 初始化失敗：" + (e?.message || e) + "（請確認 LIFF_ID 與 channel 設定）");
  });
})();
</script>
</body>
</html>
