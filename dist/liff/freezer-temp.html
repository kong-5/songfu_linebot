<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>冷凍冷藏溫度記錄 · 松富物流</title>
<style>
  :root { --accent:#1d4ed8; --ok:#16a34a; --warn:#d97706; --bad:#dc2626; --line:#e3e2e0; --bg:#f7f6f3; --bg2:#fafafa; --txt1:#37352f; --txt2:#787774; --txt3:#9b9a97; color-scheme:light; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;background:var(--bg);color:var(--txt1);min-height:100vh;padding-bottom:env(safe-area-inset-bottom,0);}
  header{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  header h1{font-size:16px;margin:0;}
  header .who{font-size:11px;color:var(--txt2);text-align:right;}
  .toolbar{padding:10px 16px;background:#fff;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .toolbar input{padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-size:14px;}
  .status{padding:8px 16px;font-size:12px;color:var(--txt2);background:#fff;border-bottom:1px solid var(--line);}
  .status.err{background:#ffebee;color:#c62828;}
  .status.ok{background:#e7f5e9;color:#2e7d32;}
  .list{padding:8px 12px;display:flex;flex-direction:column;gap:8px;}
  .wh{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;}
  .wh .head{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:8px;}
  .wh .name{font-weight:600;font-size:15px;}
  .wh .standard{font-size:11px;color:var(--txt2);}
  .row{display:grid;grid-template-columns:auto 1fr;gap:8px 12px;align-items:center;margin-bottom:8px;}
  .row label{font-size:12px;color:var(--txt2);}
  .row input[type="number"],.row input[type="text"]{padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-size:15px;width:100%;font-family:ui-monospace,monospace;}
  /* 溫度輸入：正負切換鈕＋絕對值輸入框（iOS 小數鍵盤沒有負號鍵） */
  .temp-wrap{display:flex;gap:8px;align-items:stretch;}
  .temp-wrap .temp-input{flex:1;min-width:0;}
  .sign-btn{min-width:44px;min-height:44px;border:1px solid var(--line);border-radius:6px;background:#fff;font-size:22px;font-weight:700;line-height:1;cursor:pointer;color:var(--warn);font-family:ui-monospace,monospace;flex-shrink:0;}
  .sign-btn.neg{color:var(--accent);border-color:var(--accent);background:#eff6ff;}
  .seg{display:flex;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .seg button{flex:1;padding:8px 0;border:none;background:#fff;font-size:13px;cursor:pointer;color:var(--txt2);min-height:44px;}
  .seg button.active{background:var(--ok);color:#fff;}
  .seg button.active.danger{background:var(--bad);}
  .filler{padding:14px 16px;background:#fff;border-bottom:1px solid var(--line);}
  .filler input{padding:8px 10px;border:1px solid var(--line);border-radius:6px;width:100%;font-size:14px;}
  .footer-fixed{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--line);padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0));display:flex;gap:8px;}
  .footer-fixed button{flex:1;padding:14px;border-radius:8px;border:none;font-size:16px;font-weight:700;cursor:pointer;min-height:48px;}
  .footer-fixed .primary{background:var(--ok);color:#fff;}
  .footer-fixed .primary:disabled{background:#999;}
  .empty{padding:40px 20px;text-align:center;color:var(--txt3);font-size:13px;}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#37352f;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;}
  .toast.show{opacity:1;}
  .alert-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
  .alert-badge.bad{background:#fee2e2;color:#b91c1c;}
</style>
</head>
<body>
<header>
  <h1>🌡️ 冷凍冷藏溫度記錄</h1>
  <div class="who" id="me">登入中…</div>
</header>
<div class="toolbar">
  <label style="font-size:13px;color:var(--txt2);">日期</label>
  <input type="date" id="date-input">
  <button type="button" id="today-btn" style="padding:6px 12px;border:1px solid var(--line);border-radius:6px;background:#fff;font-size:12px;cursor:pointer;">今天</button>
</div>
<div class="filler">
  <label style="font-size:12px;color:var(--txt2);">填表人</label>
  <input type="text" id="filler-input" placeholder="自動帶入 LINE 名稱，可修改">
</div>
<div class="status" id="status">載入中…</div>
<div class="list" id="list"></div>
<div class="footer-fixed">
  <button type="button" class="primary" id="save-btn" disabled>儲存所有溫度</button>
</div>
<div class="toast" id="toast"></div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
(function(){
  const LIFF_ID = window.__LIFF_ID__ || "";
  const $ = (s) => document.querySelector(s);
  const statusEl = $("#status");
  const listEl = $("#list");
  const toastEl = $("#toast");
  const dateInput = $("#date-input");
  const fillerInput = $("#filler-input");
  const saveBtn = $("#save-btn");
  let idToken = null;
  let warehouses = [];
  let entries = {};
  let confirmedAt = null;  // 當日已填表完成時間（有值＝再儲存會覆蓋，需先確認）

  function setStatus(cls, text){ statusEl.className = "status " + cls; statusEl.textContent = text; }
  function toast(text, ms){
    toastEl.textContent = text; toastEl.classList.add("show");
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toastEl.classList.remove("show"), ms || 2000);
  }
  function todayTaipei(){
    return new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Taipei"}).format(new Date());
  }
  async function api(path, opts){
    const init = Object.assign({headers:{}}, opts || {});
    init.headers["Authorization"] = "Bearer " + (liff.getIDToken() || "");
    if (init.body && !init.headers["Content-Type"]) init.headers["Content-Type"] = "application/json";
    const r = await fetch(path, init);
    let j = null;
    try { j = await r.json(); } catch(_){}
    if (r.status === 401 && /expired|IdToken/i.test(String(j?.error || ""))) {
      try { toast("登入逾時，正在更新…", 3000); liff.login({redirectUri:location.href}); } catch(_){}
      return new Promise(() => {});
    }
    return { status: r.status, body: j || {} };
  }
  function escapeHtml(s){ return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]); }
  // 該倉預設正負號：合規溫度 ≥0（冷藏）預設「＋」，其餘（冷凍／未設定）預設「−」
  function defaultNeg(w){
    const stdN = parseFloat(String(w.compliant_temp||"").match(/-?\d+(\.\d+)?/)?.[0] || "");
    return !(Number.isFinite(stdN) && stdN >= 0);
  }
  // 組合正負號＋絕對值 → 實際存的溫度字串（空值不帶符號）
  function combineTemp(neg, absStr){
    const v = String(absStr == null ? "" : absStr).trim().replace(/^[-+]+/, "");
    return v ? ((neg ? "-" : "") + v) : "";
  }

  if (!LIFF_ID){ setStatus("err", "尚未設定 LIFF_ID_FREEZER_TEMP"); return; }
  liff.init({liffId:LIFF_ID}).then(async ()=>{
    if (!liff.isLoggedIn()){ liff.login({redirectUri:location.href}); return; }
    const p = await liff.getProfile();
    $("#me").textContent = p.displayName || "";
    fillerInput.value = p.displayName || "";
    idToken = liff.getIDToken();
    if (!idToken){ setStatus("err","無法取得 ID Token"); return; }
    dateInput.value = todayTaipei();
    $("#today-btn").addEventListener("click", ()=>{ dateInput.value = todayTaipei(); load(); });
    dateInput.addEventListener("change", load);
    saveBtn.addEventListener("click", doSave);
    await load();
  }).catch(e => setStatus("err","LIFF 初始化失敗："+(e?.message||e)));

  async function load(){
    setStatus("","載入中…");
    saveBtn.disabled = true;
    const date = dateInput.value || todayTaipei();
    const r = await api("/liff/api/freezer-temp/load?date="+encodeURIComponent(date));
    if (r.status !== 200 || !r.body.ok){
      setStatus("err", r.body.error || ("HTTP "+r.status));
      return;
    }
    warehouses = r.body.warehouses || [];
    entries = {};
    for (const e of (r.body.entries||[])) entries[e.warehouseId] = e;
    if (r.body.filler_name) fillerInput.value = r.body.filler_name;
    confirmedAt = r.body.confirmed_at || null;
    if (r.body.confirmed_at){
      setStatus("ok", "✓ "+date+" 已填表"+(r.body.anomaly?"（含異常）":""));
    } else if (Object.keys(entries).length){
      setStatus("","已部分填寫，可繼續完成");
    } else {
      setStatus("", warehouses.length ? date+" · "+warehouses.length+" 個庫房待填" : "尚無庫房");
    }
    render();
    saveBtn.disabled = warehouses.length === 0;
  }

  function render(){
    if (!warehouses.length){
      listEl.innerHTML = '<div class="empty">尚未設定庫房，請至後台「冷凍／冷藏」新增</div>';
      return;
    }
    listEl.innerHTML = warehouses.map(w => {
      const e = entries[w.id] || {temp:"",powerOk:true,lightOff:true,heatOk:true};
      const tempVal = String(e.temp || "").trim();
      // 正負號：已有輸入以內容為準（開頭 - 即負），否則依該倉合規溫度預設（冷凍 −／冷藏 ＋）
      const neg = tempVal ? tempVal.startsWith("-") : defaultNeg(w);
      const absVal = tempVal.replace(/^[-+]+/, "");
      // 異常檢測：簡單版（合規溫度若是 -18 以下開頭，且實際溫度大於合規數字 +5 度則警示）
      let alertHtml = "";
      const stdN = parseFloat(String(w.compliant_temp||"").match(/-?\d+(\.\d+)?/)?.[0] || "");
      const curN = parseFloat(tempVal);
      if (Number.isFinite(stdN) && Number.isFinite(curN)){
        const diff = curN - stdN;
        if (diff > 5) alertHtml = '<span class="alert-badge bad">⚠ 超標</span>';
      }
      return `<div class="wh" data-wh="${escapeHtml(w.id)}">
        <div class="head">
          <span class="name">${escapeHtml(w.name)} ${alertHtml}</span>
          <span class="standard">合規 ${escapeHtml(w.compliant_temp||"未設")}</span>
        </div>
        <div class="row">
          <label>溫度（℃）</label>
          <div class="temp-wrap">
            <button type="button" class="sign-btn${neg?" neg":""}" aria-label="切換正負號" title="切換正負號">${neg?"−":"＋"}</button>
            <input type="text" class="temp-input" inputmode="decimal" value="${escapeHtml(absVal)}" placeholder="例：18.5">
          </div>
        </div>
        <div class="row">
          <label>電源</label>
          <div class="seg">
            <button type="button" class="seg-btn ${e.powerOk?"active":""}" data-field="powerOk" data-val="1">正常</button>
            <button type="button" class="seg-btn ${!e.powerOk?"active danger":""}" data-field="powerOk" data-val="0">異常</button>
          </div>
        </div>
        <div class="row">
          <label>電燈</label>
          <div class="seg">
            <button type="button" class="seg-btn ${e.lightOff?"active":""}" data-field="lightOff" data-val="1">關閉</button>
            <button type="button" class="seg-btn ${!e.lightOff?"active danger":""}" data-field="lightOff" data-val="0">開啟</button>
          </div>
        </div>
        <div class="row">
          <label>電熱</label>
          <div class="seg">
            <button type="button" class="seg-btn ${e.heatOk?"active":""}" data-field="heatOk" data-val="1">符合</button>
            <button type="button" class="seg-btn ${!e.heatOk?"active danger":""}" data-field="heatOk" data-val="0">不符合</button>
          </div>
        </div>
      </div>`;
    }).join("");
    // 綁定 seg 按鈕
    listEl.querySelectorAll(".wh").forEach(card => {
      const whId = card.dataset.wh;
      const signBtn = card.querySelector(".sign-btn");
      const tempInp = card.querySelector(".temp-input");
      const ensureEntry = () => {
        if (!entries[whId]) entries[whId] = {warehouseId:whId,temp:"",powerOk:true,lightOff:true,heatOk:true};
        return entries[whId];
      };
      const setNeg = (neg) => {
        signBtn.classList.toggle("neg", neg);
        signBtn.textContent = neg ? "−" : "＋";
      };
      const syncTemp = () => {
        // 組合「正負鈕＋絕對值」回寫 entries，並刷新該卡 alert badge
        ensureEntry().temp = combineTemp(signBtn.classList.contains("neg"), tempInp.value);
        const w = warehouses.find(x => String(x.id) === String(whId));
        if (w){
          const stdN = parseFloat(String(w.compliant_temp||"").match(/-?\d+(\.\d+)?/)?.[0] || "");
          const curN = parseFloat(entries[whId].temp);
          const nameEl = card.querySelector(".name");
          const existingBadge = nameEl.querySelector(".alert-badge");
          if (existingBadge) existingBadge.remove();
          if (Number.isFinite(stdN) && Number.isFinite(curN) && (curN - stdN) > 5){
            nameEl.insertAdjacentHTML("beforeend", ' <span class="alert-badge bad">⚠ 超標</span>');
          }
        }
      };
      signBtn.addEventListener("click", () => { setNeg(!signBtn.classList.contains("neg")); syncTemp(); });
      tempInp.addEventListener("input", () => {
        // Android 鍵盤有負號：使用者自己打了「-」→ 以輸入內容為準，同步切換鈕並移除字元
        if (tempInp.value.includes("-")){
          tempInp.value = tempInp.value.replace(/-/g, "");
          setNeg(true);
        }
        syncTemp();
      });
      card.querySelectorAll(".seg-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const field = btn.dataset.field;
          const val = btn.dataset.val === "1";
          if (!entries[whId]) entries[whId] = {warehouseId:whId,temp:"",powerOk:true,lightOff:true,heatOk:true};
          entries[whId][field] = val;
          // toggle visual state
          btn.parentElement.querySelectorAll(".seg-btn").forEach(b => b.classList.remove("active","danger"));
          btn.classList.add("active");
          if (!val) btn.classList.add("danger");
        });
      });
    });
  }

  async function doSave(){
    const date = dateInput.value || todayTaipei();
    const filler = fillerInput.value.trim();
    if (!filler){ toast("請填寫填表人"); return; }
    // 當日已填表完成 → 再儲存會覆蓋，先確認
    if (confirmedAt && !confirm(date + " 已填表完成，重新儲存會覆蓋原紀錄，確定要覆蓋？")) return;
    // 補上所有 warehouse 的條目（沒填的也記錄空值）
    const cards = Array.from(listEl.querySelectorAll(".wh"));
    const payload = warehouses.map(w => {
      const e = entries[w.id] || {warehouseId:w.id,temp:"",powerOk:true,lightOff:true,heatOk:true};
      // 從 DOM 拿最新 temp（正負鈕＋絕對值輸入框組合，避免 input 改了沒回寫 entries）
      const card = cards.find(c => c.dataset.wh === String(w.id));
      const inp = card ? card.querySelector(".temp-input") : null;
      const signBtn = card ? card.querySelector(".sign-btn") : null;
      const t = inp ? combineTemp(signBtn && signBtn.classList.contains("neg"), inp.value) : (e.temp||"");
      return {warehouseId:w.id, temp:t, powerOk:!!e.powerOk, lightOff:!!e.lightOff, heatOk:!!e.heatOk};
    });
    saveBtn.disabled = true;
    saveBtn.textContent = "儲存中…";
    // [fix 2026-07-08] api() 內 fetch 網路錯誤會 throw，過去沒接住 → 按鈕永遠卡在「儲存中…」。
    // 用 try/finally 保證按鈕一定復原；成功才 reload。
    let ok = false;
    try {
      const r = await api("/liff/api/freezer-temp/save", {
        method:"POST",
        body: JSON.stringify({date, fillerName:filler, entries:payload})
      });
      if (r.status !== 200 || !r.body.ok){
        toast("儲存失敗："+(r.body.error || "HTTP "+r.status));
      } else {
        ok = true;
        toast("✓ 已儲存"+(r.body.anomaly?"（含異常將提醒主管）":""));
      }
    } catch(e){
      toast("儲存失敗：網路異常，請重試（"+(e?.message||e)+"）");
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = "儲存所有溫度";
    }
    if (ok) await load();
  }
})();
</script>
</body>
</html>
